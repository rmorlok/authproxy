host: localhost:8082
info:
  contact: {}
  description: AuthProxy is an open-source, embeddable integration platform-as-a-service
    (iPaaS). It manages the connection lifecycle to 3rd party systems, allowing applications
    to call those systems through an authenticating proxy.
  title: AuthProxy API
  version: "1.0"
paths:
  /actors:
    get:
      consumes:
      - application/json
      description: List actors with optional filtering and pagination
      parameters:
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Maximum number of results to return
        in: query
        name: limit
        type: integer
      - description: Filter by external ID
        in: query
        name: external_id
        type: string
      - description: Filter by namespace
        in: query
        name: namespace
        type: string
      - description: Filter by label selector
        in: query
        name: label_selector
        type: string
      - description: Order by field (e.g., 'created_at:asc')
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_rmorlok_authproxy_internal_schema_api_openapi.ListActorsResponseJson'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List actors
      tags:
      - actors
    post:
      consumes:
      - application/json
      description: Create a new actor in a namespace
      parameters:
      - description: Actor creation request
        in: body
        name: request
