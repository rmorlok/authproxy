apiVersion: batch/v1
kind: Job
metadata:
  name: authproxy-proxy-k6
  labels:
    app.kubernetes.io/name: k6
    app.kubernetes.io/component: load-generator
    loadtest.authproxy.io/scenario: proxy
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k6
        app.kubernetes.io/component: load-generator
        loadtest.authproxy.io/scenario: proxy
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /scripts/proxy.js
            - --summary-export
            - /artifacts/summary.json
            - --out
            - experimental-prometheus-rw
          env:
            - name: AUTHPROXY_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: authproxy-loadtest-k6-auth
                  key: AUTHPROXY_BEARER_TOKEN
            - name: K6_CONNECTIONS_FILE
              value: /scripts/connections.csv
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: http://prometheus-loadtest:9090/api/v1/write
          envFrom:
            - configMapRef:
                name: authproxy-loadtest-k6-env
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: artifacts
              mountPath: /artifacts
      volumes:
        - name: scripts
          configMap:
            name: authproxy-loadtest-k6
        - name: artifacts
          emptyDir: {}
