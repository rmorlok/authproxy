apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
    loadtest.authproxy.io/component: dependency
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: database
        loadtest.authproxy.io/component: dependency
    spec:
      containers:
        - name: postgresql
          image: docker.io/bitnamilegacy/postgresql:17.2.0-debian-12-r6
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRESQL_USERNAME
              value: authproxy
            - name: POSTGRESQL_DATABASE
              value: authproxy
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authproxy-load-db
                  key: AUTHPROXY_DB_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
    loadtest.authproxy.io/component: dependency
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
