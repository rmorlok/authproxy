name: 100k
namespace: authproxy-load
description: Baseline high-cardinality target profile.
cluster:
  target: real-cluster
objects:
  namespaces_min: 50000
  namespaces_max: 100000
  connections: 100000
  oauth_tokens_expiring_percent:
    - 10
    - 50
    - 100
  periodic_probe_percent:
    - 1
    - 10
    - 100
authproxy:
  api_replicas: 2
  worker_replicas: 2
  public_replicas: 1
  admin_api_replicas: 1
k6:
  mode: operator
  scenario: proxy-raw
  rate: 500
  duration: 10m
  time_unit: 1s
  connection_rows: 10000
  parallelism: 4
  pre_allocated_vus: 250
  max_vus: 2000
  request_timeout: 30s
  p95_latency_ms: 1000
  max_failed_rate: 0.001
  upstream_status: 200
  upstream_bytes: 256
  upstream_delay_ms: 0
  upstream_jitter_ms: 0
  upstream_bearer_prefix: at_
  upstream_path_prefix: /test/load/resource/proxy
  soak_duration: 2h
  spike_base_rate: 500
  spike_rate: 1500
  spike_ramp_up: 2m
  spike_hold: 5m
  spike_ramp_down: 2m
  spike_recovery: 5m
  scale_replicas:
    - 2
    - 4
    - 8
    - 16
acceptance:
  max_5xx_rate: 0.001
  p95_latency_target: profile-configured
  refresh_sweep_must_drain_before_next_cron: true
