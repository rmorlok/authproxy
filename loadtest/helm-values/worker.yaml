replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 8
  targetCPUUtilizationPercentage: 75
  metrics:
    - type: Pods
      pods:
        metric:
          name: authproxy_asynq_queue_size
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

services:
  worker:
    enabled: true

worker:
  workflowPollers: 8
  activityPollers: 16
  maxParallelWorkflowTasks: 32
  maxParallelActivityTasks: 64

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi
