replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 16
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

services:
  api:
    enabled: true

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi
