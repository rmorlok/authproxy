{{- /*
  Let's Encrypt prod ClusterIssuer. Templated by this chart rather than
  the cert-manager subchart so we can pin the issuer name/email to
  values shared with downstream chart consumers.

  Helm hook deferral: the cert-manager CRDs land via the subchart in
  the normal install step, but ClusterIssuer is itself one of those
  CRDs — applying it in the same pass races against the CRD's
  Established=True condition. The post-install/post-upgrade hook
  guarantees the CRD exists before this apply.

  Hook weight: cert-manager's own `startupapicheck` Job is also a
  post-install hook at weight "1" — it pokes the cert-manager API
  through the validating webhook, only succeeding once the webhook
  is actually serving. Set this weight HIGHER than that so the
  ClusterIssuer apply doesn't race the webhook coming up. Helm runs
  hooks in ascending weight order; using "10" leaves headroom for
  any future "between" hook we want to add.

  Hook delete policy: hook-succeeded would garbage-collect the issuer
  after each install. We want it to stick around, so delete only when
  the hook itself fails (preserve a working issuer across upgrades).
*/ -}}
{{- if .Values.clusterIssuer.enabled -}}
{{- $solver := default "http01" .Values.clusterIssuer.solver -}}
{{- $dnsZones := .Values.clusterIssuer.route53.dnsZones -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuer.name | quote }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: hook-failed
spec:
  acme:
    server: {{ .Values.clusterIssuer.server | quote }}
    email: {{ required "global.acmeEmail is required when clusterIssuer.enabled" .Values.global.acmeEmail | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-account-key" .Values.clusterIssuer.name | quote }}
    solvers:
      {{- if eq $solver "route53" }}
      -
        {{- if or $dnsZones .Values.global.domain }}
        selector:
          dnsZones:
            {{- if $dnsZones }}
            {{- toYaml $dnsZones | nindent 12 }}
            {{- else }}
            - {{ .Values.global.domain | quote }}
            {{- end }}
        {{- end }}
        dns01:
          route53:
            region: {{ required "clusterIssuer.route53.region is required when clusterIssuer.solver=route53" .Values.clusterIssuer.route53.region | quote }}
            hostedZoneID: {{ required "global.hostedZoneId or clusterIssuer.route53.hostedZoneId is required when clusterIssuer.solver=route53" (default .Values.global.hostedZoneId .Values.clusterIssuer.route53.hostedZoneId) | quote }}
      {{- else if eq $solver "http01" }}
      - http01:
          ingress:
            ingressClassName: {{ .Values.clusterIssuer.solverIngressClass | quote }}
      {{- else }}
      {{- fail (printf "unsupported clusterIssuer.solver %q; expected http01 or route53" $solver) }}
      {{- end }}
{{- end }}
