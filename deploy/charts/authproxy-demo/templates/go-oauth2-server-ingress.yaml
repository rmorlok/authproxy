{{- if and .Values.ingress.enabled .Values.global.hostname .Values.goOauth2Server.enabled -}}
{{/*
  go-oauth2-server is reachable at https://oauth2.<hostname>. The
  provider UI redirects between /web/* paths, so it needs to own its
  host root instead of being path-routed under the demo shell.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-go-oauth2-server" (include "authproxy-demo.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "authproxy-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: go-oauth2-server
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClassName | quote }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ include "authproxy-demo.goOauth2Server.publicHost" . | quote }}
      secretName: {{ printf "%s-tls" (include "authproxy-demo.fullname" .) | quote }}
  {{- end }}
  rules:
    - host: {{ include "authproxy-demo.goOauth2Server.publicHost" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "authproxy-demo.goOauth2Server.name" . }}
                port:
                  number: 80
{{- end -}}
