# authproxy-demo umbrella chart values.
#
# Section guide:
#   global           — shared inputs (hostname, ACME issuer, image tags)
#   demoShell        — inline Deployment for the SSO stand-in host
#   goOauth2Server   — inline Deployment for the demo connector target
#   ingress          — public Ingresses for demo shell, UIs, and test OAuth
#   grafana          — optional Grafana subchart + app-metrics dashboards
#   secrets          — auto-generation toggles for keys + passwords
#   authproxy / postgresql / redis / minio — subchart passthroughs

global:
  # -- Public hostname the demo lives at. Required. Example: demo.authproxy.net.
  hostname: ""

  # -- cert-manager ClusterIssuer name to bind the TLS cert against.
  # Defaults to the issuer installed by the bootstrap chart (`letsencrypt-prod`).
  clusterIssuer: "letsencrypt-prod"

  # -- IngressClass for the umbrella Ingress. Matches the bootstrap chart default.
  ingressClassName: "nginx"

  # Bitnami removed their free Docker Hub images in Aug 2025; the
  # archived versions live under `docker.io/bitnamilegacy/...`. The
  # subchart-level image.repository overrides below redirect each
  # subchart to that namespace; allowInsecureImages lets the bitnami
  # charts use unsupported (i.e. non-tanzu) tags without erroring.
  security:
    allowInsecureImages: true

demoShell:
  enabled: true
  image:
    repository: ghcr.io/rmorlok/authproxy-demo-shell
    tag: ""               # falls back to .Chart.AppVersion
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  # -- Container port the backend listens on (matches PORT env, default 8888).
  port: 8888

goOauth2Server:
  # -- Enable the OAuth2 test provider used by demo smoke tests. It runs in
  # upstream test mode, which uses an embedded store and exposes /test/* control
  # endpoints for client/user setup and request inspection.
  enabled: true
  image:
    # go-oauth2-server image — see https://github.com/rmorlok/go-oauth2-server.
    # Upstream's default branch is `master`, so that's the tag the Build
    # Image workflow over there publishes.
    repository: ghcr.io/rmorlok/go-oauth2-server
    tag: "master"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  # -- Container port the upstream test-mode server listens on.
  port: 8080

ingress:
  # -- Toggle the umbrella Ingress. Disable when something else fronts the
  # stack (e.g. local port-forwarding).
  enabled: true
  annotations: {}
  # -- TLS handled by cert-manager via the cluster-issuer annotation.
  tls: true
  # -- Request `<hostname>` plus `*.<hostname>` in the TLS secret instead
  # of listing each subdomain. Requires a DNS-01 issuer; HTTP-01 cannot
  # issue wildcard certificates.
  wildcardSubdomains: false

grafanaAuthProxy:
  # -- Render the AuthProxy datasource and dashboard provisioning ConfigMaps
  # consumed by the Grafana chart sidecars.
  enabled: true
  datasource:
    enabled: true
    # -- Datasource name shown in Grafana.
    name: AuthProxy
    # -- Stable UID used by the sample dashboards.
    uid: authproxy-app-metrics
    # -- Internal AuthProxy API port. Matches deploy/charts/authproxy
    # `ports.api` default; override if the inner chart port is customized.
    authproxyApiPort: 8081
    # -- Override the full AuthProxy base URL used by the datasource.
    # Defaults to http://<release>-authproxy:<authproxyApiPort>.
    authproxyBaseUrl: ""
    # -- Grafana reads this environment variable when provisioning the
    # datasource. The grafana.envValueFrom block below wires it from a Secret.
    jwtEnvVar: AUTHPROXY_GRAFANA_JWT
  dashboards:
    enabled: true

grafana:
  enabled: true
  # -- Install the AuthProxy datasource plugin. If installing from a
  # release artifact URL instead of the Grafana catalog, override this with
  # the GF_INSTALL_PLUGINS entry format: https://.../plugin.zip;plugin-folder.
  plugins:
    - rmorlok-authproxy-datasource
  # -- The demo Ingress serves Grafana under /grafana.
  grafana.ini:
    plugins:
      allow_loading_unsigned_plugins: rmorlok-authproxy-datasource
    server:
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      provider:
        allowUiUpdates: true
    datasources:
      enabled: true
      label: grafana_datasource
  envValueFrom:
    AUTHPROXY_GRAFANA_JWT:
      secretKeyRef:
        # Create this Secret before install/upgrade; see README.
        name: authproxy-grafana-jwt
        key: jwt

secrets:
  # -- When true, the chart auto-generates DB / Redis / MinIO passwords
  # on first install via sprig random helpers. Subsequent upgrades
  # reuse the existing Secrets (via the `lookup` template helper) so
  # sessions don't invalidate. Keypair Secrets (JWT signing, demo-shell
  # admin) need real openssl and must be operator-provided — see README.
  autoGenerate: true

seed:
  # -- When true, install a post-install/post-upgrade hook Job that
  # creates the demo actors via the AuthProxy admin API. Idempotent —
  # safe to leave on for every `helm upgrade`.
  enabled: true
  image:
    repository: ghcr.io/rmorlok/authproxy-demo-seed
    tag: ""               # falls back to .Chart.AppVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  # -- Admin-api port to target. Matches the inner authproxy chart's
  # default service port for the `adminApi` service.
  adminApiPort: 8082
  # -- Actors to seed. Each entry is the schema the demo-seed binary
  # consumes — `external_id` is the only required field. Add or
  # override via `--set` / values overlay to seed customer-specific
  # actors alongside the defaults.
  actors:
    - external_id: demo-admin
      namespace: root
      labels:
        demo: "true"
        role: admin
    - external_id: demo-user
      namespace: root
      labels:
        demo: "true"
        role: user
    - external_id: fresh-user
      namespace: root
      labels:
        demo: "true"
        role: user
    - external_id: grafana
      namespace: root
      labels:
        demo: "true"
        role: datasource
  # -- Test-mode state to seed into go-oauth2-server before the OAuth
  # connectors are published. These clients use the public AuthProxy
  # callback URL, while connector token/resource calls can stay inside
  # the cluster via the go-oauth2-server Service.
  oauth2TestProvider:
    base_url: "http://{{ include \"authproxy-demo.goOauth2Server.name\" . }}"
    clients:
      - key: demo-oauth-simple
        secret: demo-oauth-simple-secret
        redirect_uri: "https://marketplace.{{ .Values.global.hostname }}/oauth2/callback"
        token_endpoint_auth_method: client_secret_post
        scope: "read profile resources"
      - key: demo-oauth-tenant
        secret: demo-oauth-tenant-secret
        redirect_uri: "https://marketplace.{{ .Values.global.hostname }}/oauth2/callback"
        token_endpoint_auth_method: client_secret_post
        scope: "read profile resources"
      - key: demo-oauth-configure
        secret: demo-oauth-configure-secret
        redirect_uri: "https://marketplace.{{ .Values.global.hostname }}/oauth2/callback"
        token_endpoint_auth_method: client_secret_post
        scope: "read profile resources"
    users:
      - username: demo-oauth-user@example.test
        password: demo-password
        email: demo-oauth-user@example.test
        display_name: Demo OAuth User
        sub: demo-oauth-user
    resource_policies:
      - path: /test/resource/demo-resources
        required_scope: resources
  # -- Connectors to seed into the Marketplace catalog. Each entry gets
  # created through the AuthProxy admin API, then forced to `primary` so
  # fresh demo environments show the catalog immediately. `key` is the
  # stable seed identity used for idempotent upgrades; the AuthProxy API
  # still owns the generated connector id.
  connectors:
    - key: demo-readme-noauth
      namespace: root
      labels:
        demo: "true"
        auth_method: no_auth
        showcase: catalog
      definition:
        display_name: "Demo README Resource"
        logo:
          mime_type: image/svg+xml
          base64: 
        highlight: "A no-auth catalog entry used to verify demo seeding."
        description: "This connector is intentionally simple: it demonstrates that the demo-seed job can publish connector definitions into the Marketplace catalog during install and upgrade. Follow-up demo connectors show OAuth, API key auth, pre-connect tenant selection, and post-connect configuration."
        labels:
          type: demo-readme-noauth
          demo: "true"
        auth:
          type: no-auth
    - key: demo-oauth-simple
      namespace: root
      labels:
        demo: "true"
        auth_method: oauth2
        showcase: simple-oauth
      definition:
        display_name: "Demo OAuth: Basic Authorization"
        logo:
          mime_type: image/svg+xml
          base64: 
        highlight: "A plain OAuth authorization-code connection with no extra setup."
        description: "This connector demonstrates AuthProxy's simplest OAuth path: the user clicks Connect, approves access in the demo OAuth provider, and AuthProxy stores the resulting tokens for proxy requests. Use provider username `demo-oauth-user@example.test` and password `demo-password` when the consent screen asks you to sign in."
        labels:
          type: demo-oauth-simple
          demo: "true"
        auth:
          type: OAuth2
          client_id: demo-oauth-simple
          client_secret: demo-oauth-simple-secret
          authorization:
            endpoint: "https://{{ .Values.global.hostname }}/oauth2/web/authorize"
          token:
            endpoint: "http://{{ include \"authproxy-demo.goOauth2Server.name\" . }}/v1/oauth/tokens"
          scopes:
            - id: read
              reason: "Read basic profile information from the demo provider."
            - id: profile
              reason: "Show how connectors explain why each requested OAuth scope is needed."
    - key: demo-oauth-tenant
      namespace: root
      labels:
        demo: "true"
        auth_method: oauth2
        showcase: preconnect
      definition:
        display_name: "Demo OAuth: Tenant Selection"
        logo:
          mime_type: image/svg+xml
          base64: 
        highlight: "Collects a pretend tenant before starting OAuth."
        description: "This connector demonstrates pre-connect setup. AuthProxy asks for a pretend tenant before redirecting to OAuth, then makes that value available to OAuth endpoint templates. In a real connector this pattern selects the customer's regional login host or tenant-specific authorization parameters before credentials are requested."
        labels:
          type: demo-oauth-tenant
          demo: "true"
        auth:
          type: OAuth2
          client_id: demo-oauth-tenant
          client_secret: demo-oauth-tenant-secret
          authorization:
            endpoint: "https://{{ .Values.global.hostname }}/oauth2/web/authorize"
            query_overrides:
              tenant: "{{`{{cfg.tenant}}`}}"
          token:
            endpoint: "http://{{ include \"authproxy-demo.goOauth2Server.name\" . }}/v1/oauth/tokens"
          scopes:
            - id: read
              reason: "Read access after the selected tenant has authorized the app."
            - id: profile
              reason: "Display which demo user approved the tenant-scoped connection."
        setup_flow:
          preconnect:
            steps:
              - id: tenant
                title: "Choose a pretend tenant"
                description: "This pre-connect step runs before OAuth. The value is saved into connection configuration and can be used to shape provider-specific OAuth URLs."
                json_schema:
                  type: object
                  required:
                    - tenant
                  properties:
                    tenant:
                      type: string
                      title: Demo tenant
                      description: "Try `northwind`, `globex`, or any short tenant slug. The demo provider accepts all values; the field exists to show pre-auth configuration."
                      minLength: 2
                ui_schema:
                  type: VerticalLayout
                  elements:
                    - type: Control
                      scope: "#/properties/tenant"
    - key: demo-oauth-configure
      namespace: root
      labels:
        demo: "true"
        auth_method: oauth2
        showcase: postconnect-configure
      definition:
        display_name: "Demo OAuth: Resource Configuration"
        logo:
          mime_type: image/svg+xml
          base64: 
        highlight: "Uses OAuth first, then fetches configuration choices through the proxy."
        description: "This connector demonstrates post-connect configuration. After OAuth succeeds, AuthProxy calls a demo provider resource endpoint through the new connection and turns the response into selectable pretend resources. This is the pattern for connectors that must discover workspaces, projects, calendars, or folders after credentials exist."
        labels:
          type: demo-oauth-configure
          demo: "true"
        auth:
          type: OAuth2
          client_id: demo-oauth-configure
          client_secret: demo-oauth-configure-secret
          authorization:
            endpoint: "https://{{ .Values.global.hostname }}/oauth2/web/authorize"
          token:
            endpoint: "http://{{ include \"authproxy-demo.goOauth2Server.name\" . }}/v1/oauth/tokens"
          scopes:
            - id: read
              reason: "Complete the OAuth flow against the demo provider."
            - id: resources
              reason: "Fetch the pretend resource list used by the post-connect configuration step."
        setup_flow:
          configure:
            steps:
              - id: select_resource
                title: "Select a pretend resource"
                description: "This post-connect step is populated by a data source request through the authenticated proxy. The options stand in for provider resources such as projects, calendars, or workspaces."
                json_schema:
                  type: object
                  required:
                    - resource_id
                  properties:
                    resource_id:
                      type: string
                      title: Demo resource
                      description: "Options are loaded after OAuth using the new connection's credentials."
                      x-data-source: demo_resources
                ui_schema:
                  type: VerticalLayout
                  elements:
                    - type: Control
                      scope: "#/properties/resource_id"
                data_sources:
                  demo_resources:
                    proxy_request:
                      method: GET
                      url: "http://{{ include \"authproxy-demo.goOauth2Server.name\" . }}/test/resource/demo-resources"
                      headers:
                        Accept: application/json
                    transform: "Array.isArray(data.resources) ? data.resources.map(r => ({ value: r.id || r.value, label: r.name || r.label || r.id || r.value })) : [{ value: 'project-alpha', label: 'Project Alpha (demo)' }, { value: 'workspace-north', label: 'North Workspace (demo)' }, { value: 'reports-folder', label: 'Reports Folder (demo)' }]"

# ---------------------------------------------------------------------------
# Subchart passthroughs — see each upstream's values.yaml for the full
# surface. Only the most relevant overrides are surfaced here; deeper
# tuning happens via `--set <subchart>.foo=bar` at install time.
# ---------------------------------------------------------------------------

authproxy:
  enabled: true
  # No Ingress on the inner authproxy chart — the umbrella handles routing.
  ingress:
    enabled: false
  # Inner chart's database / redis blocks point at the bitnami sibling
  # subcharts (whose Service names are templated from this release).
  database:
    provider: postgres
    host: "{{ .Release.Name }}-postgresql"
    port: 5432
    database: authproxy
    user: authproxy
    sslmode: disable
    autoMigrate: true
    existingSecret: "{{ .Release.Name }}-db"   # contains AUTHPROXY_DB_PASSWORD
  redis:
    address: "{{ .Release.Name }}-redis-master:6379"
    existingSecret: "{{ .Release.Name }}-redis-creds"
  jwt:
    existingSecret: "{{ .Release.Name }}-jwt"
  encryptionKeys:
    existingSecret: "{{ .Release.Name }}-encryption"
  actors:
    existingSecret: "{{ .Release.Name }}-actors"
  services:
    public:
      baseUrl: "https://marketplace.{{ .Values.global.hostname }}"
      enableProxy: true
      static:
        enabled: true
    adminApi:
      ui:
        enabled: true
        baseUrl: "https://admin.{{ .Values.global.hostname }}"
        initiateSessionUrl: "https://{{ .Values.global.hostname }}/"
      static:
        enabled: true
  hostApplication:
    initiateSessionUrl: "https://{{ .Values.global.hostname }}/"
  connectors:
    autoMigrate: true
    loadFromList: []

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  auth:
    username: authproxy
    database: authproxy
    existingSecret: "{{ .Release.Name }}-db"
    secretKeys:
      adminPasswordKey: AUTHPROXY_DB_PASSWORD
      userPasswordKey: AUTHPROXY_DB_PASSWORD
  primary:
    # -- Disabled by default: the demo is throwaway and the EKS cluster
    # this chart targets doesn't ship with the aws-ebs-csi-driver addon
    # (A8 + A12). Enable + set storageClass when a persistent volume is
    # actually required.
    persistence:
      enabled: false

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
  auth:
    existingSecret: "{{ .Release.Name }}-redis-creds"
    existingSecretPasswordKey: AUTHPROXY_REDIS_PASSWORD
  architecture: standalone
  master:
    persistence:
      enabled: false

minio:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
  auth:
    rootUser: "authproxy"
    existingSecret: "{{ .Release.Name }}-minio-creds"
  defaultBuckets: "authproxy-request-logs"
  persistence:
    enabled: false
