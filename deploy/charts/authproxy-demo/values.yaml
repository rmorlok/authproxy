# authproxy-demo umbrella chart values.
#
# Section guide:
#   global           — shared inputs (hostname, ACME issuer, image tags)
#   demoShell        — inline Deployment for the SSO stand-in host
#   goOauth2Server   — inline Deployment for the demo connector target
#   ingress          — public Ingresses for demo shell, UIs, and test OAuth
#   grafana          — optional Grafana subchart + app-metrics dashboards
#   secrets          — auto-generation toggles for keys + passwords
#   authproxy / postgresql / redis / minio — subchart passthroughs

global:
  # -- Public hostname the demo lives at. Required. Example: demo.authproxy.net.
  hostname: ""

  # -- cert-manager ClusterIssuer name to bind the TLS cert against.
  # Defaults to the issuer installed by the bootstrap chart (`letsencrypt-prod`).
  clusterIssuer: "letsencrypt-prod"

  # -- IngressClass for the umbrella Ingress. Matches the bootstrap chart default.
  ingressClassName: "nginx"

  # Bitnami removed their free Docker Hub images in Aug 2025; the
  # archived versions live under `docker.io/bitnamilegacy/...`. The
  # subchart-level image.repository overrides below redirect each
  # subchart to that namespace; allowInsecureImages lets the bitnami
  # charts use unsupported (i.e. non-tanzu) tags without erroring.
  security:
    allowInsecureImages: true

demoShell:
  enabled: true
  image:
    repository: ghcr.io/rmorlok/authproxy-demo-shell
    tag: ""               # falls back to .Chart.AppVersion
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  # -- Container port the backend listens on (matches PORT env, default 8888).
  port: 8888

goOauth2Server:
  # -- Enable the OAuth2 test provider used by demo smoke tests. It runs in
  # upstream test mode, which uses an embedded store and exposes /test/* control
  # endpoints for client/user setup and request inspection.
  enabled: true
  image:
    # go-oauth2-server image — see https://github.com/rmorlok/go-oauth2-server.
    # Upstream's default branch is `master`, so that's the tag the Build
    # Image workflow over there publishes.
    repository: ghcr.io/rmorlok/go-oauth2-server
    tag: "master"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  # -- Container port the upstream test-mode server listens on.
  port: 8080

ingress:
  # -- Toggle the umbrella Ingress. Disable when something else fronts the
  # stack (e.g. local port-forwarding).
  enabled: true
  annotations: {}
  # -- TLS handled by cert-manager via the cluster-issuer annotation.
  tls: true

grafanaAuthProxy:
  # -- Render the AuthProxy datasource and dashboard provisioning ConfigMaps
  # consumed by the Grafana chart sidecars.
  enabled: true
  datasource:
    enabled: true
    # -- Datasource name shown in Grafana.
    name: AuthProxy
    # -- Stable UID used by the sample dashboards.
    uid: authproxy-app-metrics
    # -- Internal AuthProxy API port. Matches deploy/charts/authproxy
    # `ports.api` default; override if the inner chart port is customized.
    authproxyApiPort: 8081
    # -- Override the full AuthProxy base URL used by the datasource.
    # Defaults to http://<release>-authproxy:<authproxyApiPort>.
    authproxyBaseUrl: ""
    # -- Grafana reads this environment variable when provisioning the
    # datasource. The grafana.envValueFrom block below wires it from a Secret.
    jwtEnvVar: AUTHPROXY_GRAFANA_JWT
  dashboards:
    enabled: true

grafana:
  enabled: true
  # -- Install the AuthProxy datasource plugin. If installing from a
  # release artifact URL instead of the Grafana catalog, override this with
  # the GF_INSTALL_PLUGINS entry format: https://.../plugin.zip;plugin-folder.
  plugins:
    - rmorlok-authproxy-datasource
  # -- The demo Ingress serves Grafana under /grafana.
  grafana.ini:
    plugins:
      allow_loading_unsigned_plugins: rmorlok-authproxy-datasource
    server:
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      provider:
        allowUiUpdates: true
    datasources:
      enabled: true
      label: grafana_datasource
  envValueFrom:
    AUTHPROXY_GRAFANA_JWT:
      secretKeyRef:
        # Create this Secret before install/upgrade; see README.
        name: authproxy-grafana-jwt
        key: jwt

secrets:
  # -- When true, the chart auto-generates DB / Redis / MinIO passwords
  # on first install via sprig random helpers. Subsequent upgrades
  # reuse the existing Secrets (via the `lookup` template helper) so
  # sessions don't invalidate. Keypair Secrets (JWT signing, demo-shell
  # admin) need real openssl and must be operator-provided — see README.
  autoGenerate: true

seed:
  # -- When true, install a post-install/post-upgrade hook Job that
  # creates the demo actors via the AuthProxy admin API. Idempotent —
  # safe to leave on for every `helm upgrade`.
  enabled: true
  image:
    repository: ghcr.io/rmorlok/authproxy-demo-seed
    tag: ""               # falls back to .Chart.AppVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  # -- Admin-api port to target. Matches the inner authproxy chart's
  # default service port for the `adminApi` service.
  adminApiPort: 8082
  # -- Actors to seed. Each entry is the schema the demo-seed binary
  # consumes — `external_id` is the only required field. Add or
  # override via `--set` / values overlay to seed customer-specific
  # actors alongside the defaults.
  actors:
    - external_id: demo-admin
      namespace: root
      labels:
        demo: "true"
        role: admin
    - external_id: demo-user
      namespace: root
      labels:
        demo: "true"
        role: user
    - external_id: fresh-user
      namespace: root
      labels:
        demo: "true"
        role: user
    - external_id: grafana
      namespace: root
      labels:
        demo: "true"
        role: datasource

# ---------------------------------------------------------------------------
# Subchart passthroughs — see each upstream's values.yaml for the full
# surface. Only the most relevant overrides are surfaced here; deeper
# tuning happens via `--set <subchart>.foo=bar` at install time.
# ---------------------------------------------------------------------------

authproxy:
  enabled: true
  # No Ingress on the inner authproxy chart — the umbrella handles routing.
  ingress:
    enabled: false
  # Inner chart's database / redis blocks point at the bitnami sibling
  # subcharts (whose Service names are templated from this release).
  database:
    provider: postgres
    host: "{{ .Release.Name }}-postgresql"
    port: 5432
    database: authproxy
    user: authproxy
    sslmode: disable
    autoMigrate: true
    existingSecret: "{{ .Release.Name }}-db"   # contains AUTHPROXY_DB_PASSWORD
  redis:
    address: "{{ .Release.Name }}-redis-master:6379"
    existingSecret: "{{ .Release.Name }}-redis-creds"
  jwt:
    existingSecret: "{{ .Release.Name }}-jwt"
  encryptionKeys:
    existingSecret: "{{ .Release.Name }}-encryption"
  actors:
    existingSecret: "{{ .Release.Name }}-actors"
  services:
    public:
      baseUrl: "https://marketplace.{{ .Values.global.hostname }}"
      enableProxy: true
      static:
        enabled: true
    adminApi:
      ui:
        enabled: true
        baseUrl: "https://admin.{{ .Values.global.hostname }}"
        initiateSessionUrl: "https://{{ .Values.global.hostname }}/"
      static:
        enabled: true
  hostApplication:
    initiateSessionUrl: "https://{{ .Values.global.hostname }}/"
  connectors:
    autoMigrate: true
    loadFromList: []

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  auth:
    username: authproxy
    database: authproxy
    existingSecret: "{{ .Release.Name }}-db"
    secretKeys:
      adminPasswordKey: AUTHPROXY_DB_PASSWORD
      userPasswordKey: AUTHPROXY_DB_PASSWORD
  primary:
    # -- Disabled by default: the demo is throwaway and the EKS cluster
    # this chart targets doesn't ship with the aws-ebs-csi-driver addon
    # (A8 + A12). Enable + set storageClass when a persistent volume is
    # actually required.
    persistence:
      enabled: false

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
  auth:
    existingSecret: "{{ .Release.Name }}-redis-creds"
    existingSecretPasswordKey: AUTHPROXY_REDIS_PASSWORD
  architecture: standalone
  master:
    persistence:
      enabled: false

minio:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
  auth:
    rootUser: "authproxy"
    existingSecret: "{{ .Release.Name }}-minio-creds"
  defaultBuckets: "authproxy-request-logs"
  persistence:
    enabled: false
