# Default values for the authproxy chart.
#
# Section guide:
#   image / serviceAccount / replicaCount / resources / ...  — standard pod knobs
#   services.<id>.enabled                                     — toggle individual services
#   ports                                                     — container port assignments
#   ingress                                                   — single Ingress, port-name backends
#   database / redis / s3                                     — typed connectivity blocks
#   jwt / encryptionKeys                                      — Secret volumes for crypto material
#   config                                                    — escape hatch merged into the rendered AuthProxy YAML
#   healthcheck                                               — liveness / readiness shared knobs

# -- Container image to deploy.
image:
  repository: ghcr.io/rmorlok/authproxy
  # -- Image tag. Empty string falls back to Chart.appVersion.
  tag: ""
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries.
imagePullSecrets: []

# -- Override chart name in resource names.
nameOverride: ""
# -- Override the fully qualified release name in resource names.
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount for the pods.
  create: true
  # -- Annotations to apply to the ServiceAccount. Set
  # `eks.amazonaws.com/role-arn` here to wire IRSA for S3 (and skip
  # `s3.existingSecret`).
  annotations: {}
  # -- ServiceAccount name. Generated from the release name if empty.
  name: ""

# -- Replica count for the AuthProxy pod. The chart deploys a single
# Deployment running the union of enabled services in one process; for
# independent scaling per service, install the chart multiple times with
# different `services` blocks (see chart README for examples).
replicaCount: 1

# -- Annotations applied to each pod.
podAnnotations: {}
# -- Extra labels applied to each pod.
podLabels: {}

# -- Security context applied at the pod level.
podSecurityContext: {}
# -- Security context applied at the container level.
securityContext: {}

# -- Pod resource requests and limits.
resources: {}
# -- Node selector.
nodeSelector: {}
# -- Tolerations.
tolerations: []
# -- Affinity rules.
affinity: {}

# -- Toggle individual services. Disabled services are dropped from the
# `serve` argument list and from the Service's port list. Disabling
# `public` also disables the liveness/readiness probe (no HTTP listener).
services:
  api:
    enabled: true
  adminApi:
    enabled: true
    ui:
      # -- Enable AuthProxy's browser admin UI/session endpoints.
      enabled: false
      # -- Public base URL for the admin UI.
      baseUrl: ""
      # -- Host-app login URL used when the admin UI needs a session.
      initiateSessionUrl: ""
    static:
      # -- Serve the embedded admin UI from this service.
      enabled: false
      # -- URL path where the UI is mounted. Empty mounts at the service root.
      mountAt: ""
      # -- Optional on-disk UI build path. Empty uses embedded assets.
      serveFrom: ""
  public:
    enabled: true
    # -- External base URL for the public service. Used for OAuth redirect and
    # callback URLs when AuthProxy is behind an Ingress or proxy.
    baseUrl: ""
    # -- Expose /api/v1/connections/:id/_proxy on the public service.
    # Keep disabled unless browser/session clients need direct proxy calls.
    enableProxy: false
    static:
      # -- Serve the embedded marketplace UI from this service.
      enabled: false
      # -- URL path where the UI is mounted. Empty mounts at the service root.
      mountAt: ""
      # -- Optional on-disk UI build path. Empty uses embedded assets.
      serveFrom: ""
  worker:
    enabled: true

# -- Container port assignments. Match the AuthProxy config port fields.
ports:
  public: 8080
  api: 8081
  adminApi: 8082
  workerHealth: 8083

# -- Workflow worker tuning. Empty values keep the go-workflows library
# defaults. Numeric values may be supplied as YAML numbers or strings.
worker:
  workflowPollers: ""
  activityPollers: ""
  maxParallelWorkflowTasks: ""
  maxParallelActivityTasks: ""
  workflowHeartbeatInterval: ""

service:
  # -- Service type.
  type: ClusterIP

ingress:
  # -- Enable an Ingress resource.
  enabled: false
  # -- IngressClass name (e.g. `nginx`).
  className: ""
  # -- Annotations applied to the Ingress.
  annotations: {}
  # -- Host + path rules. Each path references a `service` key from
  # `ports` above (in camelCase).
  hosts:
    - host: authproxy.local
      paths:
        - path: /
          pathType: Prefix
          service: public
  # -- TLS configuration entries.
  tls: []

# -- Database connectivity. AuthProxy supports postgres + sqlite; postgres
# is the production-typical choice and is the default here.
database:
  # -- Provider: `postgres` or `sqlite`.
  provider: postgres
  # -- Postgres host (required for postgres provider).
  host: ""
  # -- Postgres port.
  port: 5432
  # -- Database name.
  database: authproxy
  # -- Postgres user.
  user: authproxy
  # -- Postgres SSL mode (`disable`, `require`, `verify-ca`, `verify-full`).
  sslmode: require
  # -- Run schema migrations at startup.
  autoMigrate: true
  # -- Secret holding the database password. Must contain a key named
  # `AUTHPROXY_DB_PASSWORD` (the env var the rendered config references).
  # The chart wires it via `envFrom`; the password never appears in the
  # rendered ConfigMap.
  existingSecret: ""
  # -- SQLite-only: filesystem path. Ignored when provider=postgres.
  path: /var/lib/authproxy/authproxy.db

# -- Redis connectivity. Required for sessions, async tasks, rate-limit
# cache, and OAuth round-trip state.
redis:
  # -- Provider: `redis` for an external Redis server, or `miniredis`
  # for an embedded in-process store suitable only for tests/disposable dev.
  provider: redis
  # -- host:port (required).
  address: ""
  # -- Optional Redis username (Redis 6 ACLs).
  username: ""
  # -- Logical DB index.
  db: 0
  # -- Secret holding the redis password. Must contain a key named
  # `AUTHPROXY_REDIS_PASSWORD` (the env var the rendered config references).
  existingSecret: ""

# -- S3-compatible blob storage for request-log payloads. Disabled by
# default; AuthProxy falls back to local/no blob storage when omitted.
s3:
  enabled: false
  bucket: ""
  region: ""
  # -- Optional S3 endpoint (e.g. MinIO). Leave empty to use AWS defaults.
  endpoint: ""
  # -- Optional key prefix for stored objects.
  prefix: ""
  # -- Force path-style addressing (MinIO + most S3-compatible services).
  forcePathStyle: false
  # -- Secret holding AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY env vars.
  # Leave empty when using IRSA (set `serviceAccount.annotations` instead).
  existingSecret: ""

# -- JWT signing key pair, mounted into the container as files (paths are
# substituted into the rendered config). The chart only references the
# Secret; customers create it.
jwt:
  existingSecret: ""
  mountPath: /etc/authproxy/keys/jwt
  publicKeyFile: system.pub
  privateKeyFile: system

# -- Global encryption key, mounted as a single-file Secret volume. The
# Secret should contain a key named `globalAesKeyFile` whose value is the
# raw key bytes (e.g. `openssl rand 32 > global_aes.key`).
encryptionKeys:
  existingSecret: ""
  mountPath: /etc/authproxy/keys/encryption
  globalAesKeyFile: global_aes.key

# -- Configured admin actors, mounted as a Secret volume at `mountPath`.
# Each actor is a pair of files in the Secret: `<name>` (private key) and
# `<name>.pub` (public key). The AuthProxy server reads the directory at
# startup and exposes each actor under its `<name>` external id.
#
# Lives in a separate Secret from `encryptionKeys.existingSecret` because
# K8s Secret data keys can't carry nested directory structure — one Secret
# = one mount directory.
actors:
  existingSecret: ""
  mountPath: /etc/authproxy/keys/actors
  # -- ACL permissions granted to every actor in the Secret. Mirrors
  # AuthProxy's `system_auth.actors.permissions` block.
  permissions:
    - namespace: "root.**"
      resources: ["*"]
      verbs: ["*"]

# -- Host application integration. AuthProxy redirects unauthenticated
# users (e.g. anyone landing on the marketplace UI) to this URL with a
# `return_to` query param so the host app can establish a session and
# bounce back. Required by the AuthProxy server's config validator —
# leave the placeholder set, but point at a real host login URL for any
# deployment that actually fronts a UI.
hostApplication:
  initiateSessionUrl: ""

# -- Application metrics + HTTP request-event capture. The AuthProxy
# server always wires up a metrics storage service, so the rendered
# config must contain an `app_metrics` block with a database
# reference. By default the chart points it at the main `database`
# block above — fine for small deploys, override for production
# data-warehouse setups (e.g. a separate ClickHouse). Was named
# `httpLogging` in earlier chart versions; renamed to mirror the
# server's config schema.
appMetrics:
  # -- Reuse the main `database` block. When true, the chart copies the
  # main database section into `app_metrics.database`. Set to false to
  # configure a dedicated `database:` block below.
  shareMainDatabase: true
  # -- Run app_metrics schema migrations at startup.
  autoMigrate: true
  # -- Dedicated database block for app_metrics. Only consulted when
  # `shareMainDatabase` is false. Same field shape as the top-level
  # `database` block (provider, host, port, etc.).
  database: {}
  # -- Full request/response recording mode (`never` or `always`).
  # Lives under `request_events` in the rendered server config.
  fullRequestRecording: never

# -- Connector registry. AuthProxy refuses to start without the connectors
# block — supply at least an empty `loadFromList` even when you intend to
# manage connectors through the admin API at runtime.
connectors:
  # -- Run connector schema migrations at startup.
  autoMigrate: true
  # -- Inline connector definitions loaded at boot. See the AuthProxy
  # connector schema docs for the format. Leave empty to manage connectors
  # exclusively through the admin API.
  loadFromList: []
  # -- Labels used to identify connectors across reloads (matching the
  # AuthProxy `connectors.identifying_labels` field).
  identifyingLabels: []

# -- Free-form config overlay merged on top of the rendered AuthProxy YAML.
# Use this for fields the chart hasn't promoted to typed values yet.
config: {}

# -- Liveness / readiness probe configuration. Targets the public service;
# only emitted when `services.public.enabled` is true.
healthcheck:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
