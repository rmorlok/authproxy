{{/*
Render the AuthProxy config YAML from typed values, layered with the free-
form `config` overlay. Sensitive fields reference env vars via the
AuthProxy StringValue { env_var: NAME } pattern so passwords stay in
Secrets, not in this ConfigMap.
*/}}
{{- $cfg := dict -}}

{{/* --- service ports --- */}}
{{- if .Values.services.public.enabled -}}
{{- $_ := set $cfg "public" (dict "port" .Values.ports.public) -}}
{{- end -}}
{{- if .Values.services.api.enabled -}}
{{- $_ := set $cfg "api" (dict "port" .Values.ports.api) -}}
{{- end -}}
{{- if .Values.services.adminApi.enabled -}}
{{- $_ := set $cfg "admin_api" (dict "port" .Values.ports.adminApi) -}}
{{- end -}}
{{- if .Values.services.worker.enabled -}}
{{- $_ := set $cfg "worker" (dict "health_check_port" .Values.ports.workerHealth) -}}
{{- end -}}

{{/*
String fields below run through `tpl` so an umbrella chart can pass
values like `"{{ .Release.Name }}-postgresql"` and have them expand
at this chart's render time. Customers passing plain literal values
see no behavior change — tpl is a no-op on strings with no
template syntax.
*/}}

{{/* --- database --- */}}
{{- $db := dict "provider" .Values.database.provider "auto_migrate" .Values.database.autoMigrate -}}
{{- if eq .Values.database.provider "postgres" -}}
{{-   $_ := set $db "host" (tpl .Values.database.host $) -}}
{{-   $_ := set $db "port" .Values.database.port -}}
{{-   $_ := set $db "user" (tpl .Values.database.user $) -}}
{{-   $_ := set $db "database" (tpl .Values.database.database $) -}}
{{-   $_ := set $db "sslmode" .Values.database.sslmode -}}
{{-   if .Values.database.existingSecret -}}
{{-     $_ := set $db "password" (dict "env_var" "AUTHPROXY_DB_PASSWORD") -}}
{{-   end -}}
{{- else if eq .Values.database.provider "sqlite" -}}
{{-   $_ := set $db "path" .Values.database.path -}}
{{- end -}}
{{- $_ := set $cfg "database" $db -}}

{{/* --- redis --- */}}
{{- $redis := dict "provider" "redis" "address" (tpl .Values.redis.address $) "db" .Values.redis.db -}}
{{- if .Values.redis.username -}}
{{-   $_ := set $redis "username" (tpl .Values.redis.username $) -}}
{{- end -}}
{{- if .Values.redis.existingSecret -}}
{{-   $_ := set $redis "password" (dict "env_var" "AUTHPROXY_REDIS_PASSWORD") -}}
{{- end -}}
{{- $_ := set $cfg "redis" $redis -}}

{{/* --- host application (required by validator) --- */}}
{{- if .Values.hostApplication.initiateSessionUrl -}}
{{-   $_ := set $cfg "host_application" (dict "initiate_session_url" (tpl .Values.hostApplication.initiateSessionUrl $)) -}}
{{- end -}}

{{/* --- connectors block (required by validator; empty list is acceptable) --- */}}
{{- $connectors := dict "auto_migrate" .Values.connectors.autoMigrate "load_from_list" .Values.connectors.loadFromList -}}
{{- if .Values.connectors.identifyingLabels -}}
{{-   $_ := set $connectors "identifying_labels" .Values.connectors.identifyingLabels -}}
{{- end -}}
{{- $_ := set $cfg "connectors" $connectors -}}

{{/* --- app_metrics (server unconditionally wires up the metrics store) --- */}}
{{/*
  The app_metrics migrator + the main DB migrator share golang-migrate's
  default `schema_migrations` table, so they can't run against the same
  schema. For SQLite that means a sibling file (default path with an
  `.app-metrics` suffix); for Postgres, app_metrics uses tables prefixed
  inside the same DB and conflicts are not observed in practice.

  Server-side this used to be `http_logging`; renamed to `app_metrics`
  with the request-event capture moved under a `request_events`
  sub-block. See internal/schema/config/app_metrics.go.
*/}}
{{/*
  When shareMainDatabase is true we pick a per-provider strategy that
  avoids the golang-migrate `schema_migrations` collision:
    - SQLite: sibling file path (`<main>.app-metrics`).
    - Postgres: app_metrics gets pinned to an ephemeral SQLite file
      under /tmp instead of sharing the main Postgres database.
      Postgres-share would have to either (a) create a second
      database on the same server, or (b) pass an
      `x-migrations-table` URI param the Go migrator picks up.
      Both are bigger lifts than warranted for a demo; flip
      `shareMainDatabase: false` + supply your own
      `appMetrics.database` block for production-grade setups.
*/}}
{{- $metricsDb := dict -}}
{{- if .Values.appMetrics.shareMainDatabase -}}
{{-   if eq .Values.database.provider "sqlite" -}}
{{-     $sharedPath := printf "%s.app-metrics" .Values.database.path -}}
{{-     $metricsDb = dict "provider" "sqlite" "path" $sharedPath -}}
{{-   else -}}
{{-     $metricsDb = dict "provider" "sqlite" "path" "/tmp/authproxy-app-metrics.db" -}}
{{-   end -}}
{{- else -}}
{{-   $metricsDb = .Values.appMetrics.database -}}
{{- end -}}
{{- $appMetrics := dict
      "auto_migrate" .Values.appMetrics.autoMigrate
      "database" $metricsDb
      "request_events" (dict
        "full_request_recording" .Values.appMetrics.fullRequestRecording) -}}
{{- $_ := set $cfg "app_metrics" $appMetrics -}}

{{/* --- s3 (request-log blob storage) --- */}}
{{- if .Values.s3.enabled -}}
{{-   $s3 := dict "provider" "s3" "bucket" .Values.s3.bucket "force_path_style" .Values.s3.forcePathStyle -}}
{{-   if .Values.s3.region -}}{{- $_ := set $s3 "region" .Values.s3.region -}}{{- end -}}
{{-   if .Values.s3.endpoint -}}{{- $_ := set $s3 "endpoint" .Values.s3.endpoint -}}{{- end -}}
{{-   if .Values.s3.prefix -}}{{- $_ := set $s3 "prefix" .Values.s3.prefix -}}{{- end -}}
{{-   $creds := dict "type" "implicit" -}}
{{-   $_ := set $s3 "credentials" $creds -}}
{{-   $_ := set $cfg "blob_storage" $s3 -}}
{{- end -}}

{{/* --- crypto material file paths --- */}}
{{- if .Values.jwt.existingSecret -}}
{{-   $sysAuth := dict "jwt_signing_key" (dict
        "public_key" (dict "path" (printf "%s/%s" .Values.jwt.mountPath .Values.jwt.publicKeyFile))
        "private_key" (dict "path" (printf "%s/%s" .Values.jwt.mountPath .Values.jwt.privateKeyFile))) -}}
{{-   if .Values.encryptionKeys.existingSecret -}}
{{-     $_ := set $sysAuth "global_aes_key" (dict "path" (printf "%s/%s" .Values.encryptionKeys.mountPath .Values.encryptionKeys.globalAesKeyFile)) -}}
{{-   end -}}
{{-   if .Values.actors.existingSecret -}}
{{-     $actors := dict "keys_path" .Values.actors.mountPath -}}
{{-     if .Values.actors.permissions -}}
{{-       $_ := set $actors "permissions" .Values.actors.permissions -}}
{{-     end -}}
{{-     $_ := set $sysAuth "actors" $actors -}}
{{-   end -}}
{{-   $_ := set $cfg "system_auth" $sysAuth -}}
{{- end -}}

{{/* --- overlay: merge user-provided `config` over the rendered defaults --- */}}
{{- $cfg = mergeOverwrite $cfg .Values.config -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "authproxy.fullname" . }}-config
  labels:
    {{- include "authproxy.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- toYaml $cfg | nindent 4 }}
