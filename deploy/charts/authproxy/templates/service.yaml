apiVersion: v1
kind: Service
metadata:
  name: {{ include "authproxy.fullname" . }}
  labels:
    {{- include "authproxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "authproxy.selectorLabels" . | nindent 4 }}
  ports:
    {{- range $name, $port := .Values.service.ports }}
    - name: {{ $name | kebabcase }}
      port: {{ $port }}
      targetPort: {{ $name | kebabcase }}
      protocol: TCP
    {{- end }}
