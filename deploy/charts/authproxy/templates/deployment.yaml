{{- $services := include "authproxy.enabledServices" . -}}
{{- if not $services -}}
{{- fail "At least one service must be enabled. Set services.<id>.enabled=true for one of: api, adminApi, public, worker." -}}
{{- end -}}
{{- $ports := (include "authproxy.enabledPorts" . | fromYaml).ports -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authproxy.fullname" . }}
  labels:
    {{- include "authproxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "authproxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "authproxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll pods when the rendered config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "authproxy.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: authproxy
          image: {{ include "authproxy.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - serve
            - --config=/etc/authproxy/config.yaml
            - {{ $services | quote }}
          {{- if $ports }}
          ports:
            {{- range $ports }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: TCP
            {{- end }}
          {{- end }}
          {{- if or .Values.database.existingSecret .Values.redis.existingSecret .Values.s3.existingSecret }}
          envFrom:
            {{- /*
              `tpl` re-renders the value as a template using the root
              context — lets an umbrella chart pass `"{{ .Release.Name }}-db"`
              and have it expand here. Customers passing a plain
              literal Secret name see no behavior change.
            */}}
            {{- with .Values.database.existingSecret }}
            - secretRef:
                name: {{ tpl . $ }}
            {{- end }}
            {{- with .Values.redis.existingSecret }}
            - secretRef:
                name: {{ tpl . $ }}
            {{- end }}
            {{- with .Values.s3.existingSecret }}
            - secretRef:
                name: {{ tpl . $ }}
            {{- end }}
          {{- end }}
          {{- if .Values.services.public.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path }}
              port: public
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path }}
              port: public
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/authproxy/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- with .Values.jwt.existingSecret }}
            - name: jwt-keys
              mountPath: {{ $.Values.jwt.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.encryptionKeys.existingSecret }}
            - name: encryption-keys
              mountPath: {{ $.Values.encryptionKeys.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.actors.existingSecret }}
            - name: actors-keys
              mountPath: {{ $.Values.actors.mountPath }}
              readOnly: true
            {{- end }}
            {{- if and (eq .Values.blobStorage.provider "filesystem") .Values.blobStorage.filesystem.emptyDir }}
            - name: blob-storage
              mountPath: {{ .Values.blobStorage.filesystem.path }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "authproxy.fullname" . }}-config
        {{- /* See note above re: tpl on existingSecret values. */}}
        {{- with .Values.jwt.existingSecret }}
        - name: jwt-keys
          secret:
            secretName: {{ tpl . $ }}
        {{- end }}
        {{- with .Values.encryptionKeys.existingSecret }}
        - name: encryption-keys
          secret:
            secretName: {{ tpl . $ }}
        {{- end }}
        {{- with .Values.actors.existingSecret }}
        - name: actors-keys
          secret:
            secretName: {{ tpl . $ }}
        {{- end }}
        {{- if and (eq .Values.blobStorage.provider "filesystem") .Values.blobStorage.filesystem.emptyDir }}
        - name: blob-storage
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
