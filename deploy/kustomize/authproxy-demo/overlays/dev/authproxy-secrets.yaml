apiVersion: apps/v1
kind: Deployment
metadata:
  name: authproxy
spec:
  template:
    spec:
      containers:
        - name: authproxy
          envFrom:
            - secretRef:
                name: dev-db
                optional: true
            - secretRef:
                name: dev-redis-creds
                optional: true
            - secretRef:
                name: dev-minio-creds
                optional: true
      volumes:
        - name: jwt-keys
          secret:
            secretName: dev-jwt
        - name: encryption-keys
          secret:
            secretName: dev-encryption
        - name: actors-keys
          secret:
            secretName: dev-actors
