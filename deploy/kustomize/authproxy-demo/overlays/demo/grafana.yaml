apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
data:
  authproxy-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: AuthProxy
        uid: authproxy-app-metrics
        type: rmorlok-authproxy-datasource
        access: proxy
        editable: true
        jsonData:
          baseUrl: http://demo-authproxy:8081
        secureJsonData:
          jwt: ${AUTHPROXY_GRAFANA_JWT}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
data:
  authproxy-dashboards.yaml: |-
    apiVersion: 1
    providers:
      - name: AuthProxy
        orgId: 1
        folder: AuthProxy
        type: file
        disableDeletion: false
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/component: observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: grafana
          image: docker.io/grafana/grafana:11.5.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_INSTALL_PLUGINS
              value: "__GRAFANA_PLUGIN_INSTALL__"
            - name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
              value: rmorlok-authproxy-datasource
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: AUTHPROXY_GRAFANA_JWT
              valueFrom:
                secretKeyRef:
                  name: authproxy-grafana-jwt
                  key: jwt
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources/authproxy-datasource.yaml
              subPath: authproxy-datasource.yaml
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/authproxy-dashboards.yaml
              subPath: authproxy-dashboards.yaml
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
  ports:
    - name: http
      port: 80
      targetPort: http
