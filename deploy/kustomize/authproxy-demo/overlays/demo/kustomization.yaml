apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo
namePrefix: demo-

resources:
  - ../../base
  - ingress.yaml
  - minio.yaml
  - postgres.yaml
  - redis.yaml

configMapGenerator:
  - name: authproxy-config
    files:
      - config.yaml=authproxy-config.yaml

generatorOptions:
  disableNameSuffixHash: true

patches:
  - path: authproxy-secrets.yaml
  - path: demo-shell-env.yaml
