apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-shell
  labels:
    app.kubernetes.io/name: demo-shell
    app.kubernetes.io/component: demo-shell
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-shell
      app.kubernetes.io/component: demo-shell
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-shell
        app.kubernetes.io/component: demo-shell
    spec:
      containers:
        - name: demo-shell
          image: ghcr.io/rmorlok/authproxy-demo-shell:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8888
          env:
            - name: PORT
              value: "8888"
            - name: ADMIN_USERNAME
              value: demo-shell
            - name: ADMIN_PRIVATE_KEY_PATH
              value: /etc/authproxy/demo-shell/private
            - name: AUTHPROXY_AUTH_URL
              value: https://marketplace.demo.authproxy.net
            - name: AUTHPROXY_MARKETPLACE_URL
              value: https://marketplace.demo.authproxy.net
            - name: AUTHPROXY_ADMIN_UI_URL
              value: https://admin.demo.authproxy.net
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: admin-key
              mountPath: /etc/authproxy/demo-shell
              readOnly: true
      volumes:
        - name: admin-key
          secret:
            secretName: demo-shell-key-placeholder
            items:
              - key: private
                path: private
---
apiVersion: v1
kind: Service
metadata:
  name: demo-shell
  labels:
    app.kubernetes.io/name: demo-shell
    app.kubernetes.io/component: demo-shell
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-shell
    app.kubernetes.io/component: demo-shell
  ports:
    - name: http
      port: 80
      targetPort: http
