apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-oauth2-server
  labels:
    app.kubernetes.io/name: go-oauth2-server
    app.kubernetes.io/component: go-oauth2-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: go-oauth2-server
      app.kubernetes.io/component: go-oauth2-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go-oauth2-server
        app.kubernetes.io/component: go-oauth2-server
    spec:
      containers:
        - name: go-oauth2-server
          image: ghcr.io/rmorlok/go-oauth2-server@sha256:d1e5bdae007259b0c02255f26efce595f23eb2142e7da8caa3dac544dd445cb3
          imagePullPolicy: IfNotPresent
          command:
            - go-oauth2-server
          args:
            - runserver
            - --test-mode
            - --test-port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /test/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: go-oauth2-server
  labels:
    app.kubernetes.io/name: go-oauth2-server
    app.kubernetes.io/component: go-oauth2-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: go-oauth2-server
    app.kubernetes.io/component: go-oauth2-server
  ports:
    - name: http
      port: 80
      targetPort: http
