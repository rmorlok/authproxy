apiVersion: v1
kind: ServiceAccount
metadata:
  name: authproxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authproxy
  labels:
    app.kubernetes.io/name: authproxy
    app.kubernetes.io/component: authproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authproxy
      app.kubernetes.io/component: authproxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authproxy
        app.kubernetes.io/component: authproxy
    spec:
      serviceAccountName: authproxy
      containers:
        - name: authproxy
          image: ghcr.io/rmorlok/authproxy:main
          imagePullPolicy: Always
          args:
            - serve
            - --config=/etc/authproxy/config.yaml
            - admin-api,api,public,worker
          ports:
            - name: public
              containerPort: 8080
            - name: api
              containerPort: 8081
            - name: admin-api
              containerPort: 8082
            - name: worker-health
              containerPort: 8083
          envFrom:
            - secretRef:
                name: db
                optional: true
            - secretRef:
                name: redis-creds
                optional: true
            - secretRef:
                name: minio-creds
                optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: public
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: public
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/authproxy/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: jwt-keys
              mountPath: /etc/authproxy/keys/jwt
              readOnly: true
            - name: encryption-keys
              mountPath: /etc/authproxy/keys/encryption
              readOnly: true
            - name: actors-keys
              mountPath: /etc/authproxy/keys/actors
              readOnly: true
            - name: blob-storage
              mountPath: /tmp/authproxy-blobs
      volumes:
        - name: config
          configMap:
            name: authproxy-config
        - name: jwt-keys
          secret:
            secretName: authproxy-jwt-placeholder
        - name: encryption-keys
          secret:
            secretName: authproxy-encryption-placeholder
        - name: actors-keys
          secret:
            secretName: authproxy-actors-placeholder
        - name: blob-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: authproxy
  labels:
    app.kubernetes.io/name: authproxy
    app.kubernetes.io/component: authproxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: authproxy
    app.kubernetes.io/component: authproxy
  ports:
    - name: public
      port: 8080
      targetPort: public
    - name: api
      port: 8081
      targetPort: api
    - name: admin-api
      port: 8082
      targetPort: admin-api
    - name: worker-health
      port: 8083
      targetPort: worker-health
