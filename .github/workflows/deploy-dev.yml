# schema: https://json.schemastore.org/github-workflow.json
name: Deploy Dev

# Deploys one isolated authproxy-demo environment for pull requests
# labeled `deploy:demo`. The namespace is derived from the PR branch
# name and the image tag is the Build Image workflow's PR tag:
# `pr-<number>`.
#
# Fork PRs are skipped deliberately: the image workflow does not push
# GHCR tags for forks, and deploying untrusted fork code with AWS OIDC
# would be the wrong trust boundary.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, closed]

permissions:
  actions: read
  contents: read
  id-token: write
  issues: write
  packages: read
  pull-requests: write

concurrency:
  group: deploy-dev-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'deploy:demo')
    runs-on: ubuntu-latest
    environment: gha-eks
    timeout-minutes: 45

    env:
      RELEASE_NAME: dev
      KUSTOMIZE_OVERLAY: deploy/kustomize/authproxy-demo/overlays/dev
      DEV_DOMAIN: ${{ vars.DEV_DOMAIN || 'dev.authproxy.net' }}
      DEV_CLUSTER_ISSUER: ${{ vars.DEV_CLUSTER_ISSUER || 'letsencrypt-prod-dns01' }}
      REGISTRY: ghcr.io
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve environment names
        id: env
        run: |
          set -euo pipefail

          # DNS-1123 label: lowercase alnum + "-", max 63 chars, no edge "-".
          label="$(printf '%s' "${BRANCH_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"
          if [ -z "${label}" ]; then
            label="pr-${PR_NUMBER}"
          fi

          # Keep room for the namespace's "dev-" prefix.
          label="${label:0:59}"
          label="$(printf '%s' "${label}" | sed -E 's/-+$//')"
          if [ -z "${label}" ]; then
            label="pr-${PR_NUMBER}"
          fi

          namespace="dev-${label}"
          hostname="${label}.${DEV_DOMAIN}"
          image_tag="pr-${PR_NUMBER}"

          {
            echo "label=${label}"
            echo "namespace=${namespace}"
            echo "hostname=${hostname}"
            echo "image_tag=${image_tag}"
          } >> "$GITHUB_OUTPUT"

          echo "Namespace: ${namespace}"
          echo "Hostname:  https://${hostname}/"
          echo "Image tag: ${image_tag}"

      - name: Wait for Build Image workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 30 * 60))
          while true; do
            run_json="$(gh run list \
              --workflow "Build Image" \
              --commit "${PR_HEAD_SHA}" \
              --event pull_request \
              --json databaseId,status,conclusion \
              --limit 20 \
              --jq '[.[] | select((.conclusion // "") != "cancelled")] | .[0] // empty')"

            if [ -n "${run_json}" ]; then
              status="$(jq -r '.status' <<<"${run_json}")"
              conclusion="$(jq -r '.conclusion // ""' <<<"${run_json}")"
              run_id="$(jq -r '.databaseId' <<<"${run_json}")"
              echo "Build Image run ${run_id}: ${status} ${conclusion}"

              if [ "${status}" = "completed" ]; then
                if [ "${conclusion}" = "success" ]; then
                  exit 0
                fi
                echo "Build Image run ${run_id} finished with ${conclusion}" >&2
                exit 1
              fi
            else
              echo "Non-cancelled Build Image run for ${PR_HEAD_SHA} has not appeared yet."
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for Build Image on ${PR_HEAD_SHA}" >&2
              exit 1
            fi

            sleep 15
          done

      - name: Wait for PR image tag in GHCR
        run: |
          set -euo pipefail

          tag="${{ steps.env.outputs.image_tag }}"
          owner="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          images=(
            authproxy
            authproxy-demo-shell
            authproxy-demo-seed
          )

          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin >/dev/null

          deadline=$((SECONDS + 30 * 60))
          while true; do
            missing=()
            for image in "${images[@]}"; do
              ref="${REGISTRY}/${owner}/${image}:${tag}"
              if docker manifest inspect "${ref}" >/dev/null 2>&1; then
                echo "Found ${ref}"
              else
                missing+=("${ref}")
              fi
            done

            if [ "${#missing[@]}" -eq 0 ]; then
              exit 0
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for image tag ${tag}. Missing:" >&2
              printf '  %s\n' "${missing[@]}" >&2
              exit 1
            fi

            echo "Waiting for Build Image to publish ${tag}:"
            printf '  %s\n' "${missing[@]}"
            sleep 30
          done

      - name: Assume GH Actions role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Wire kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER }}" \
            --region "${{ vars.AWS_REGION }}"
          kubectl get nodes -o wide

      - name: Provision dev namespace secrets
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          kubectl create ns "${RELEASE_NS}" --dry-run=client -o yaml | kubectl apply -f -

          if ! kubectl -n "${RELEASE_NS}" get secret "${RELEASE_NAME}-jwt" >/dev/null 2>&1; then
            openssl genrsa -out "${workdir}/system" 2048
            openssl rsa -in "${workdir}/system" -pubout -out "${workdir}/system.pub"
            kubectl -n "${RELEASE_NS}" create secret generic "${RELEASE_NAME}-jwt" \
              --from-file=system="${workdir}/system" \
              --from-file=system.pub="${workdir}/system.pub"
          else
            echo "Reusing ${RELEASE_NAME}-jwt"
          fi

          if ! kubectl -n "${RELEASE_NS}" get secret "${RELEASE_NAME}-encryption" >/dev/null 2>&1; then
            openssl rand -out "${workdir}/global_aes.key" 32
            kubectl -n "${RELEASE_NS}" create secret generic "${RELEASE_NAME}-encryption" \
              --from-file=global_aes.key="${workdir}/global_aes.key"
          else
            echo "Reusing ${RELEASE_NAME}-encryption"
          fi

          if ! kubectl -n "${RELEASE_NS}" get secret "${RELEASE_NAME}-demo-shell-key" >/dev/null 2>&1; then
            openssl genrsa -out "${workdir}/demo-shell" 2048
            openssl rsa -in "${workdir}/demo-shell" -pubout -out "${workdir}/demo-shell.pub"
            kubectl -n "${RELEASE_NS}" create secret generic "${RELEASE_NAME}-demo-shell-key" \
              --from-file=private="${workdir}/demo-shell" \
              --from-file=demo-shell.pub="${workdir}/demo-shell.pub"
          else
            kubectl -n "${RELEASE_NS}" get secret "${RELEASE_NAME}-demo-shell-key" \
              -o jsonpath='{.data.demo-shell\.pub}' \
              | base64 -d > "${workdir}/demo-shell.pub"
            echo "Reusing ${RELEASE_NAME}-demo-shell-key"
          fi

          if ! kubectl -n "${RELEASE_NS}" get secret "${RELEASE_NAME}-actors" >/dev/null 2>&1; then
            kubectl -n "${RELEASE_NS}" create secret generic "${RELEASE_NAME}-actors" \
              --from-file=demo-shell.pub="${workdir}/demo-shell.pub" \
              --from-file=demo-admin.pub="${workdir}/demo-shell.pub" \
              --from-file=demo-user.pub="${workdir}/demo-shell.pub" \
              --from-file=fresh-user.pub="${workdir}/demo-shell.pub" \
              --from-file=grafana.pub="${workdir}/demo-shell.pub"
          else
            echo "Reusing ${RELEASE_NAME}-actors"
          fi

      - name: Clear stale seed job
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        run: |
          set -euo pipefail

          kubectl -n "${RELEASE_NS}" delete job "${RELEASE_NAME}-seed" \
            --ignore-not-found --wait=false
          kubectl -n "${RELEASE_NS}" delete configmap "${RELEASE_NAME}-seed-config" \
            --ignore-not-found

          for _ in $(seq 1 24); do
            if ! kubectl -n "${RELEASE_NS}" get job "${RELEASE_NAME}-seed" >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for stale ${RELEASE_NAME}-seed Job to be deleted..."
            sleep 5
          done

          if kubectl -n "${RELEASE_NS}" get job "${RELEASE_NAME}-seed" >/dev/null 2>&1; then
            echo "Timed out waiting for stale ${RELEASE_NAME}-seed Job to delete." >&2
            exit 1
          fi

      - name: Render Kustomize overlay
        id: render
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
          DEV_HOSTNAME: ${{ steps.env.outputs.hostname }}
          IMAGE_TAG: ${{ steps.env.outputs.image_tag }}
        run: |
          set -euo pipefail
          manifest="${RUNNER_TEMP}/dev-kustomize.yaml"

          find "${KUSTOMIZE_OVERLAY}" -type f -name '*.yaml' -print0 \
            | xargs -0 perl -0pi -e 's/branch\.dev\.authproxy\.net/$ENV{DEV_HOSTNAME}/g; s/authproxy-dev-placeholder/$ENV{RELEASE_NS}/g; s/letsencrypt-prod-dns01/$ENV{DEV_CLUSTER_ISSUER}/g'

          find "${KUSTOMIZE_OVERLAY}" -type f -name kustomization.yaml -print0 \
            | xargs -0 perl -0pi -e 's#(name: ghcr\.io/rmorlok/(?:authproxy|authproxy-demo-shell|authproxy-demo-seed)\n\s+newTag: )main#${1}$ENV{IMAGE_TAG}#g'

          kubectl kustomize "${KUSTOMIZE_OVERLAY}" > "${manifest}"
          echo "manifest=${manifest}" >> "$GITHUB_OUTPUT"

          grep -Fq "namespace: ${RELEASE_NS}" "${manifest}"
          grep -Fq "host: ${DEV_HOSTNAME}" "${manifest}"
          grep -Fq "image: ghcr.io/rmorlok/authproxy:${IMAGE_TAG}" "${manifest}"
          grep -Fq "image: ghcr.io/rmorlok/authproxy-demo-shell:${IMAGE_TAG}" "${manifest}"
          grep -Fq "provider: miniredis" "${manifest}"
          grep -Fq "provider: filesystem" "${manifest}"
          if grep -Eq "name: dev-(postgresql|redis-master|minio)$" "${manifest}"; then
            echo "Dev Kustomize render leaked backing service workloads" >&2
            exit 1
          fi

      - name: Apply Kustomize manifest
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        run: |
          set -euo pipefail
          manifest="${{ steps.render.outputs.manifest }}"

          kubectl -n "${RELEASE_NS}" apply -f "${manifest}"

          for deployment in "${RELEASE_NAME}-authproxy" "${RELEASE_NAME}-demo-shell"; do
            kubectl -n "${RELEASE_NS}" patch "deployment/${deployment}" \
              --type merge \
              -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"demo.authproxy.net/image-revision\":\"${PR_HEAD_SHA}\"}}}}}"
          done

      - name: Wait for workload rollouts
        timeout-minutes: 5
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        run: |
          set -euo pipefail
          for d in \
            "${RELEASE_NAME}-authproxy" \
            "${RELEASE_NAME}-demo-shell" \
            "${RELEASE_NAME}-go-oauth2-server"
          do
            kubectl -n "${RELEASE_NS}" rollout status "deployment/$d" --timeout=5m
          done

      - name: Wait for TLS certificates
        timeout-minutes: 20
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        run: |
          set -euo pipefail
          for cert_name in "${RELEASE_NAME}-branch-wildcard-tls" "${RELEASE_NAME}-subdomain-wildcard-tls"; do
            echo "Waiting for certificate/${cert_name}..."
            if kubectl -n "${RELEASE_NS}" wait \
              --for=condition=Ready \
              "certificate/${cert_name}" \
              --timeout=18m; then
              continue
            fi

            kubectl -n "${RELEASE_NS}" describe "certificate/${cert_name}" || true
            kubectl -n "${RELEASE_NS}" get certificate,order,challenge || true
            exit 1
          done

      - name: Render seed job
        id: seed
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        run: |
          set -euo pipefail
          manifest="${RUNNER_TEMP}/dev-seed.yaml"

          kubectl kustomize "${KUSTOMIZE_OVERLAY}/seed" > "${manifest}"

          echo "manifest=${manifest}" >> "$GITHUB_OUTPUT"
          grep -Fq "namespace: ${RELEASE_NS}" "${manifest}"
          grep -Fq "image: ghcr.io/rmorlok/authproxy-demo-seed:${{ steps.env.outputs.image_tag }}" "${manifest}"
          grep -Fq "value: http://dev-authproxy:8082" "${manifest}"
          grep -Fq "base_url: http://dev-go-oauth2-server" "${manifest}"

      - name: Run seed job
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        run: |
          set -euo pipefail
          manifest="${{ steps.seed.outputs.manifest }}"

          kubectl -n "${RELEASE_NS}" apply -f "${manifest}"

          if ! kubectl -n "${RELEASE_NS}" wait \
            --for=condition=complete "job/${RELEASE_NAME}-seed" \
            --timeout=10m; then
            kubectl -n "${RELEASE_NS}" describe "job/${RELEASE_NAME}-seed" || true
            kubectl -n "${RELEASE_NS}" logs "job/${RELEASE_NAME}-seed" \
              --all-containers --tail=-1 || true
            exit 1
          fi

          kubectl -n "${RELEASE_NS}" logs "job/${RELEASE_NAME}-seed" \
            --all-containers --tail=-1

      - name: Smoke test (demo connectors)
        id: smoke
        timeout-minutes: 10
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
          SMOKE_BASE_URL: https://${{ steps.env.outputs.hostname }}
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          kubectl -n "${RELEASE_NS}" get secret "${RELEASE_NAME}-demo-shell-key" \
            -o jsonpath='{.data.private}' \
            | base64 -d > "${workdir}/demo-shell.private"
          chmod 600 "${workdir}/demo-shell.private"

          log_path="${RUNNER_TEMP}/authproxy-smoke.log"
          echo "log_path=${log_path}" >> "$GITHUB_OUTPUT"
          {
            echo "Smoke-testing ${SMOKE_BASE_URL}"
            cd integration_tests
            SMOKE_ADMIN_KEY="${workdir}/demo-shell.private" \
              go test -tags smoke ./smoke -run TestRemote -count=1 -v
          } 2>&1 | tee "${log_path}"

      - name: Post smoke failure comment
        if: failure() && steps.smoke.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          SMOKE_LOG_PATH: ${{ steps.smoke.outputs.log_path }}
          DEV_URL: https://${{ steps.env.outputs.hostname }}/
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- authproxy-dev-smoke-failure -->';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const raw = fs.existsSync(process.env.SMOKE_LOG_PATH)
              ? fs.readFileSync(process.env.SMOKE_LOG_PATH, 'utf8')
              : 'Smoke log was not found on the runner.';
            const log = raw.length > 6000 ? raw.slice(raw.length - 6000) : raw;
            const body = [
              marker,
              '## Dev environment smoke test failed',
              '',
              '| Item | Value |',
              '| --- | --- |',
              `| URL | ${process.env.DEV_URL} |`,
              `| Namespace | \`${process.env.RELEASE_NS}\` |`,
              '',
              'The environment was left running for debugging.',
              '',
              '<details><summary>Smoke log</summary>',
              '',
              '```text',
              log,
              '```',
              '',
              '</details>',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Post dev environment comment
        uses: actions/github-script@v7
        env:
          DEV_URL: https://${{ steps.env.outputs.hostname }}/
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
          IMAGE_TAG: ${{ steps.env.outputs.image_tag }}
        with:
          script: |
            const marker = '<!-- authproxy-dev-environment -->';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const body = [
              marker,
              '## Dev environment is ready',
              '',
              '| Item | Value |',
              '| --- | --- |',
              `| URL | ${process.env.DEV_URL} |`,
              `| Namespace | \`${process.env.RELEASE_NS}\` |`,
              `| Image tag | \`${process.env.IMAGE_TAG}\` |`,
              '',
              'This comment is updated after each successful deploy.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Dump debug info
        if: failure()
        env:
          RELEASE_NS: ${{ steps.env.outputs.namespace }}
        run: |
          set +e
          echo "::group::Kubernetes resources"
          kubectl -n "${RELEASE_NS}" get all,ingress,certificate,order,challenge -o wide
          echo "::endgroup::"

          echo "::group::Pods"
          kubectl -n "${RELEASE_NS}" describe pods
          echo "::endgroup::"

          echo "::group::Jobs"
          kubectl -n "${RELEASE_NS}" describe jobs
          echo "::endgroup::"

          echo "::group::Events"
          kubectl -n "${RELEASE_NS}" get events --sort-by=.lastTimestamp
          echo "::endgroup::"

          for pod in $(kubectl -n "${RELEASE_NS}" get pods -o name); do
            echo "::group::Logs ${pod}"
            kubectl -n "${RELEASE_NS}" logs "${pod}" --all-containers --tail=200
            kubectl -n "${RELEASE_NS}" logs "${pod}" --all-containers --previous --tail=200
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Dev deploy"
            echo ""
            echo "- Result:    ${{ job.status }}"
            echo "- Namespace: \`${{ steps.env.outputs.namespace }}\`"
            echo "- Hostname:  \`https://${{ steps.env.outputs.hostname }}/\`"
            echo "- Image tag: \`${{ steps.env.outputs.image_tag }}\`"
            echo "- Renderer:  \`kubectl kustomize ${KUSTOMIZE_OVERLAY}\`"
            echo "- Seeded:    \`kubectl kustomize ${KUSTOMIZE_OVERLAY}/seed\`"
          } >> "$GITHUB_STEP_SUMMARY"

  teardown:
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'deploy:demo')
    runs-on: ubuntu-latest
    environment: gha-eks
    timeout-minutes: 15

    env:
      DEV_DOMAIN: ${{ vars.DEV_DOMAIN || 'dev.authproxy.net' }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}

    steps:
      - name: Resolve environment names
        id: env
        run: |
          set -euo pipefail

          # Keep this slugging in sync with the deploy job so closed PRs
          # delete the same namespace they created.
          label="$(printf '%s' "${BRANCH_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"
          if [ -z "${label}" ]; then
            label="pr-${PR_NUMBER}"
          fi

          label="${label:0:59}"
          label="$(printf '%s' "${label}" | sed -E 's/-+$//')"
          if [ -z "${label}" ]; then
            label="pr-${PR_NUMBER}"
          fi

          namespace="dev-${label}"
          hostname="${label}.${DEV_DOMAIN}"

          {
            echo "label=${label}"
            echo "namespace=${namespace}"
            echo "hostname=${hostname}"
          } >> "$GITHUB_OUTPUT"

          echo "Namespace: ${namespace}"
          echo "Hostname:  https://${hostname}/"

      - name: Assume GH Actions role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Wire kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Delete dev namespace
        run: |
          kubectl delete namespace "${{ steps.env.outputs.namespace }}" \
            --ignore-not-found \
            --wait=true \
            --timeout=10m

      - name: Summary
        if: always()
        run: |
          {
            echo "## Dev teardown"
            echo ""
            echo "- Result:    ${{ job.status }}"
            echo "- Namespace: \`${{ steps.env.outputs.namespace }}\`"
            echo "- Hostname:  \`https://${{ steps.env.outputs.hostname }}/\`"
          } >> "$GITHUB_STEP_SUMMARY"
