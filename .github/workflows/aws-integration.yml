# schema: https://json.schemastore.org/github-workflow.json
name: AWS Secrets Manager Integration Tests

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  aws-secrets-integration:
    environment: AWS Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: authproxy_integration
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8124:8123
        env:
          CLICKHOUSE_DB: authproxy
          CLICKHOUSE_USER: authproxy
          CLICKHOUSE_PASSWORD: authproxy
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Start MinIO
      run: |
        docker run -d --name minio -p 9003:9000 \
          -e MINIO_ROOT_USER=minioadmin \
          -e MINIO_ROOT_PASSWORD=minioadmin \
          minio/minio:latest server /data
        for i in $(seq 1 30); do
          curl -sf http://localhost:9003/minio/health/live && break
          sleep 1
        done

    - name: Create MinIO bucket
      run: |
        docker run --rm --network host \
          -e MC_HOST_minio=http://minioadmin:minioadmin@localhost:9003 \
          minio/mc mb --ignore-existing minio/authproxy-request-logs

    - name: AWS Secrets Manager Integration Tests
      working-directory: integration_tests
      env:
        AUTH_PROXY_TEST_DATABASE_PROVIDER: postgres
        POSTGRES_TEST_HOST: localhost
        POSTGRES_TEST_PORT: "5433"
        POSTGRES_TEST_USER: postgres
        POSTGRES_TEST_PASSWORD: postgres
        POSTGRES_TEST_DATABASE: authproxy_integration
        POSTGRES_TEST_OPTIONS: sslmode=disable
        AUTH_PROXY_AWS_SECRETS_TEST: "1"
        AWS_REGION: ${{ secrets.AWS_REGION }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      run: go test -tags "integration,aws" -v -timeout 10m ./encrypt/...
