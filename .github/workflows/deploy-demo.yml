# schema: https://json.schemastore.org/github-workflow.json
name: Deploy Demo

# Auto-deploys the hosted demo environment after Build Image publishes
# main-branch images. Demo deploys are rendered with Kustomize; seeding is
# intentionally handled by the manual Seed Demo workflow.
#
# Trust + auth: this workflow assumes the `authproxy-eks-gh-actions`
# IAM role via OIDC. The role's trust policy (from
# deploy/terraform/eks/iam_oidc.tf) only honors `sts:AssumeRoleWithWebIdentity`
# when the JWT's `sub` claim contains `environment:gha-eks` (or matches
# one of the release-tag patterns), hence `environment: gha-eks`.
#
# Pre-requisites:
#   - EKS cluster up and bootstrap chart installed.
#   - `demo` namespace secrets exist: demo-jwt, demo-encryption,
#     demo-demo-shell-key, demo-actors, demo-db, demo-redis-creds,
#     and demo-minio-creds.
#   - Repo secret AWS_ROLE_ARN.
#   - Repo variables AWS_REGION, EKS_CLUSTER, and DEMO_HOSTNAME.
#   - Optional repo variable GRAFANA_AUTHPROXY_PLUGIN_INSTALL with Grafana's
#     GF_INSTALL_PLUGINS value. Leave unset until the AuthProxy datasource
#     plugin has a published install URL.

on:
  workflow_run:
    workflows: ["Build Image"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (default: sha-<short>)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  packages: read

concurrency:
  group: deploy-demo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: gha-eks
    timeout-minutes: 35

    env:
      RELEASE_NAME: demo
      RELEASE_NS: demo
      KUSTOMIZE_OVERLAY: deploy/kustomize/authproxy-demo/overlays/demo
      REGISTRY: ghcr.io
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Resolve image tag
        id: tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.image_tag }}" ]; then
            tag="${{ inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            tag="sha-$(printf '%s' "${DEPLOY_SHA}" | cut -c1-7)"
          else
            tag="sha-$(git rev-parse --short HEAD)"
          fi

          echo "sha=${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Deploying commit: ${DEPLOY_SHA}"
          echo "Deploying image tag: ${tag}"

      - name: Verify image tag in GHCR
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          owner="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          images=(
            authproxy
            authproxy-demo-shell
          )

          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin >/dev/null

          deadline=$((SECONDS + 5 * 60))
          while true; do
            missing=()
            for image in "${images[@]}"; do
              ref="${REGISTRY}/${owner}/${image}:${tag}"
              if docker manifest inspect "${ref}" >/dev/null 2>&1; then
                echo "Found ${ref}"
              else
                missing+=("${ref}")
              fi
            done

            if [ "${#missing[@]}" -eq 0 ]; then
              exit 0
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out verifying image tag ${tag}. Missing:" >&2
              printf '  %s\n' "${missing[@]}" >&2
              exit 1
            fi

            echo "Waiting for GHCR to expose ${tag}:"
            printf '  %s\n' "${missing[@]}"
            sleep 30
          done

      - name: Assume GH Actions role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Wire kubeconfig
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER }}" \
            --region "${{ vars.AWS_REGION }}"
          kubectl get nodes -o wide

      - name: Preserve operator demo secrets
        id: preserve
        run: |
          set -euo pipefail
          secrets_manifest="${RUNNER_TEMP}/demo-preserved-secrets.json"

          kubectl create namespace "${RELEASE_NS}" --dry-run=client -o yaml \
            | kubectl apply -f -

          secrets=(
            "${RELEASE_NAME}-jwt"
            "${RELEASE_NAME}-encryption"
            "${RELEASE_NAME}-demo-shell-key"
            "${RELEASE_NAME}-actors"
            "${RELEASE_NAME}-db"
            "${RELEASE_NAME}-redis-creds"
            "${RELEASE_NAME}-minio-creds"
          )

          for secret in "${secrets[@]}"; do
            if ! kubectl -n "${RELEASE_NS}" get "secret/${secret}" >/dev/null 2>&1; then
              echo "Required demo secret ${secret} does not exist in namespace ${RELEASE_NS}" >&2
              exit 1
            fi
          done

          kubectl -n "${RELEASE_NS}" get secret "${secrets[@]}" -o json \
            | jq 'del(
                .metadata.resourceVersion,
                .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                .items[].metadata.annotations."meta.helm.sh/release-name",
                .items[].metadata.annotations."meta.helm.sh/release-namespace",
                .items[].metadata.creationTimestamp,
                .items[].metadata.labels."app.kubernetes.io/managed-by",
                .items[].metadata.managedFields,
                .items[].metadata.ownerReferences,
                .items[].metadata.resourceVersion,
                .items[].metadata.uid
              )' \
            > "${secrets_manifest}"

          echo "manifest=${secrets_manifest}" >> "$GITHUB_OUTPUT"

      - name: Remove legacy Helm release state
        run: |
          set -euo pipefail

          for release in "${RELEASE_NAME}" authproxy-demo; do
            if helm status "${release}" --namespace "${RELEASE_NS}" >/dev/null 2>&1; then
              echo "Uninstalling legacy Helm release ${release} in namespace ${RELEASE_NS}"
              helm uninstall "${release}" --namespace "${RELEASE_NS}" --wait --timeout 5m
            else
              echo "Legacy Helm release ${release} not present in namespace ${RELEASE_NS}"
            fi
          done

          kubectl -n "${RELEASE_NS}" apply -f "${{ steps.preserve.outputs.manifest }}"

          # These names come from the old demo Helm chart/subcharts. Removing
          # them is safe after preserving secrets and prevents immutable
          # selector and duplicate host/path conflicts during Kustomize apply.
          kubectl -n "${RELEASE_NS}" delete deployment,statefulset,ingress \
            -l "app.kubernetes.io/managed-by=Helm,app.kubernetes.io/instance=${RELEASE_NAME}" \
            --ignore-not-found
          kubectl -n "${RELEASE_NS}" delete ingress \
            "${RELEASE_NAME}-demo-go-oauth2-server" \
            --ignore-not-found
          kubectl -n "${RELEASE_NS}" delete statefulset \
            "${RELEASE_NAME}-postgresql" \
            "${RELEASE_NAME}-redis-master" \
            --ignore-not-found

      - name: Provision Grafana datasource JWT
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          kubectl -n "${RELEASE_NS}" get secret "${RELEASE_NAME}-encryption" \
            -o jsonpath='{.data.global_aes\.key}' \
            | base64 -d > "${workdir}/global_aes.key"
          chmod 600 "${workdir}/global_aes.key"

          go run ./cmd/cli sign-jwt \
            --actorId grafana \
            --apis api,admin-api \
            --grafana-preset logs \
            --secretKeyPath "${workdir}/global_aes.key" \
            > "${workdir}/grafana.jwt"

          kubectl -n "${RELEASE_NS}" create secret generic authproxy-grafana-jwt \
            --from-file=jwt="${workdir}/grafana.jwt" \
            --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Render Kustomize overlay
        id: render
        env:
          DEMO_HOSTNAME: ${{ vars.DEMO_HOSTNAME || 'demo.authproxy.net' }}
          DEMO_CLUSTER_ISSUER: ${{ vars.DEMO_CLUSTER_ISSUER || 'letsencrypt-prod-dns01' }}
          GRAFANA_PLUGIN_INSTALL: ${{ vars.GRAFANA_AUTHPROXY_PLUGIN_INSTALL || '' }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          manifest="${RUNNER_TEMP}/demo-kustomize.yaml"

          find "${KUSTOMIZE_OVERLAY}" -type f -name '*.yaml' -print0 \
            | xargs -0 perl -0pi -e 's/demo\.authproxy\.net/$ENV{DEMO_HOSTNAME}/g; s/letsencrypt-prod-dns01/$ENV{DEMO_CLUSTER_ISSUER}/g'

          perl -0pi -e 's|(name: ghcr\.io/rmorlok/authproxy\n\s+newTag: )main|${1}$ENV{IMAGE_TAG}|g; s|(name: ghcr\.io/rmorlok/authproxy-demo-shell\n\s+newTag: )main|${1}$ENV{IMAGE_TAG}|g' \
            "${KUSTOMIZE_OVERLAY}/kustomization.yaml"
          perl -0pi -e '$r=$ENV{GRAFANA_PLUGIN_INSTALL}; s/__GRAFANA_PLUGIN_INSTALL__/$r/g' \
            "${KUSTOMIZE_OVERLAY}/grafana.yaml"

          kubectl kustomize "${KUSTOMIZE_OVERLAY}" > "${manifest}"
          echo "manifest=${manifest}" >> "$GITHUB_OUTPUT"

          grep -Fq "image: ghcr.io/rmorlok/authproxy:${IMAGE_TAG}" "${manifest}"
          grep -Fq "image: ghcr.io/rmorlok/authproxy-demo-shell:${IMAGE_TAG}" "${manifest}"
          grep -Fq "image: docker.io/grafana/grafana:11.5.2" "${manifest}"
          grep -Fq "host: ${DEMO_HOSTNAME}" "${manifest}"
          if [ -n "${GRAFANA_PLUGIN_INSTALL}" ]; then
            grep -Fq "value: ${GRAFANA_PLUGIN_INSTALL}" "${manifest}"
          fi

      - name: Apply Kustomize manifest
        run: |
          set -euo pipefail
          manifest="${{ steps.render.outputs.manifest }}"

          kubectl create namespace "${RELEASE_NS}" --dry-run=client -o yaml \
            | kubectl apply -f -
          kubectl -n "${RELEASE_NS}" apply -f "${manifest}"

          for deployment in "${RELEASE_NAME}-authproxy" "${RELEASE_NAME}-demo-shell" "${RELEASE_NAME}-grafana"; do
            kubectl -n "${RELEASE_NS}" patch "deployment/${deployment}" \
              --type merge \
              -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"demo.authproxy.net/image-revision\":\"${{ steps.tag.outputs.sha }}\"}}}}}"
          done

      - name: Collect deploy diagnostics (on failure)
        if: failure()
        run: |
          set +e
          echo "## Applied resources"
          kubectl -n "${RELEASE_NS}" get all,ingress,certificate,order,challenge -o wide
          echo
          echo "## Deployments"
          for d in \
            "${RELEASE_NAME}-authproxy" \
            "${RELEASE_NAME}-demo-shell" \
            "${RELEASE_NAME}-go-oauth2-server" \
            "${RELEASE_NAME}-postgresql" \
            "${RELEASE_NAME}-redis-master" \
            "${RELEASE_NAME}-minio" \
            "${RELEASE_NAME}-grafana" \
          ; do
            kubectl -n "${RELEASE_NS}" describe "deployment/$d"
            echo
          done
          echo "## Recent pod logs"
          for selector in authproxy demo-shell go-oauth2-server grafana; do
            kubectl -n "${RELEASE_NS}" logs \
              -l "app.kubernetes.io/name=${selector}" \
              --all-containers --tail=120
            echo
          done
          echo "## Recent events"
          kubectl -n "${RELEASE_NS}" get events \
            --sort-by='.lastTimestamp' \
            | tail -n 100

      - name: Wait for workload rollouts
        timeout-minutes: 10
        run: |
          set -euo pipefail
          for d in \
            "${RELEASE_NAME}-postgresql" \
            "${RELEASE_NAME}-redis-master" \
            "${RELEASE_NAME}-minio" \
            "${RELEASE_NAME}-authproxy" \
            "${RELEASE_NAME}-demo-shell" \
            "${RELEASE_NAME}-go-oauth2-server" \
          ; do
            echo "Waiting for $d..."
            kubectl -n "${RELEASE_NS}" rollout status "deployment/$d" --timeout=10m
          done

      - name: Wait for Grafana rollout
        if: vars.GRAFANA_AUTHPROXY_PLUGIN_INSTALL != ''
        timeout-minutes: 10
        run: |
          set -euo pipefail
          kubectl -n "${RELEASE_NS}" rollout status "deployment/${RELEASE_NAME}-grafana" --timeout=10m

      - name: Wait for TLS certificates
        timeout-minutes: 20
        run: |
          set -euo pipefail
          for cert_name in "${RELEASE_NAME}-authproxy-tls" "${RELEASE_NAME}-go-oauth2-server-tls"; do
            echo "Waiting for certificate/${cert_name}..."
            if kubectl -n "${RELEASE_NS}" wait \
              --for=condition=Ready \
              "certificate/${cert_name}" \
              --timeout=18m; then
              continue
            fi

            kubectl -n "${RELEASE_NS}" describe "certificate/${cert_name}" || true
            kubectl -n "${RELEASE_NS}" get certificate,order,challenge || true
            exit 1
          done

      - name: Smoke test (live service)
        id: smoke
        timeout-minutes: 10
        env:
          SMOKE_BASE_URL: https://${{ vars.DEMO_HOSTNAME || 'demo.authproxy.net' }}
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          kubectl -n "${RELEASE_NS}" get secret "${RELEASE_NAME}-demo-shell-key" \
            -o jsonpath='{.data.private}' \
            | base64 -d > "${workdir}/demo-shell.private"
          chmod 600 "${workdir}/demo-shell.private"

          echo "Smoke-testing ${SMOKE_BASE_URL}"
          cd integration_tests
          SMOKE_ADMIN_KEY="${workdir}/demo-shell.private" \
            go test -tags smoke ./smoke -run TestRemoteOAuth2ProxySmoke -count=1 -v

      - name: Summary
        if: always()
        run: |
          {
            echo "## Demo deploy"
            echo ""
            echo "- Result:      ${{ job.status }}"
            echo "- Image tag:   \`${{ steps.tag.outputs.tag }}\`"
            echo "- Commit:      \`${{ steps.tag.outputs.sha }}\`"
            echo "- Hostname:    \`https://${{ vars.DEMO_HOSTNAME || 'demo.authproxy.net' }}/\`"
            echo "- Grafana:     \`https://${{ vars.DEMO_HOSTNAME || 'demo.authproxy.net' }}/grafana\` (${{ vars.GRAFANA_AUTHPROXY_PLUGIN_INSTALL != '' && 'plugin install enabled' || 'plugin install not configured' }})"
            echo "- Renderer:    \`kubectl kustomize ${KUSTOMIZE_OVERLAY}\`"
            echo "- Seeding:     manual via \`Seed Demo\` workflow"
            echo "- Rollback:    rerun this workflow with a previous image tag"
          } >> "$GITHUB_STEP_SUMMARY"
