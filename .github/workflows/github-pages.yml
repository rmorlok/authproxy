# schema: https://json.schemastore.org/github-workflow.json
name: GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'sdks/js/**'
      - 'ui/marketplace/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/github-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Build and deploy
    environment: Github Pages Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build documentation
        run: yarn docs:build

      - name: Build Marketplace Storybook
        run: yarn workspace @authproxy/marketplace build-storybook

      - name: Add Marketplace Storybook to the site
        run: |
          mkdir -p docs/dist/storybook/marketplace
          cp -r ui/marketplace/storybook-static/. docs/dist/storybook/marketplace/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/dist
          branch: github-pages
          clean: true
