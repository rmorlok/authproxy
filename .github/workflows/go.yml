# schema: https://json.schemastore.org/github-workflow.json
name: Golang Codebase

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.go'
      - '**/*.json'
      - '.github/workflows/go.yml'
      - '.golangci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.go'
      - '**/*.json'
      - '.github/workflows/go.yml'
      - '.golangci.yml'

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Build
      run: go build -v ./...

    - name: Build Terraform Provider
      working-directory: terraform/provider
      run: go build -v ./...

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Test
      env:
        AUTH_PROXY_TEST_DATABASE_PROVIDER: ${{ matrix.database }}
        POSTGRES_TEST_HOST: localhost
        POSTGRES_TEST_PORT: "5432"
        POSTGRES_TEST_USER: postgres
        POSTGRES_TEST_PASSWORD: postgres
        POSTGRES_TEST_DATABASE: postgres
        POSTGRES_TEST_OPTIONS: sslmode=disable
        POSTGRES_TEST_MAX_PARALLEL: "2"
        POSTGRES_TEST_MAX_CONNS: "2"
      run: go test -v ./...

  integration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: authproxy_integration
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:latest
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8124:8123
        env:
          CLICKHOUSE_DB: authproxy
          CLICKHOUSE_USER: authproxy
          CLICKHOUSE_PASSWORD: authproxy
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Start MinIO
      run: |
        docker run -d --name minio -p 9003:9000 \
          -e MINIO_ROOT_USER=minioadmin \
          -e MINIO_ROOT_PASSWORD=minioadmin \
          minio/minio:latest server /data
        for i in $(seq 1 30); do
          curl -sf http://localhost:9003/minio/health/live && break
          sleep 1
        done

    - name: Create MinIO bucket
      run: |
        docker run --rm --network host \
          -e MC_HOST_minio=http://minioadmin:minioadmin@localhost:9003 \
          minio/mc mb --ignore-existing minio/authproxy-request-logs

    - name: Start OAuth2 test provider
      working-directory: integration_tests
      run: |
        docker compose up -d --build --wait oauth-server
        for i in $(seq 1 30); do
          curl -sf http://localhost:8086/test/health && break
          sleep 1
        done
        curl -sf http://localhost:8086/test/health

    - name: Integration Tests
      working-directory: integration_tests
      env:
        AUTH_PROXY_TEST_DATABASE_PROVIDER: postgres
        POSTGRES_TEST_HOST: localhost
        POSTGRES_TEST_PORT: "5433"
        POSTGRES_TEST_USER: postgres
        POSTGRES_TEST_PASSWORD: postgres
        POSTGRES_TEST_DATABASE: authproxy_integration
        POSTGRES_TEST_OPTIONS: sslmode=disable
        TF_ACC: "1"
      run: go test -tags integration -v -timeout 10m ./...
