# schema: https://json.schemastore.org/github-workflow.json
name: Golang Codebase

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.go'
      - '**/*.json'
      - '.github/workflows/go.yml'
      - '.golangci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.go'
      - '**/*.json'
      - '.github/workflows/go.yml'
      - '.golangci.yml'

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Build
      run: go build -v ./...

    - name: Build Terraform Provider
      working-directory: terraform/provider
      run: go build -v ./...

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The two axes are independent — main DB selector is
        # AUTH_PROXY_TEST_DATABASE_PROVIDER, request_log selector is
        # AUTH_PROXY_REQUEST_LOG_TEST_DATABASE_PROVIDER — so we pick
        # explicit combinations via include rather than a 2x3 cartesian
        # explosion. Coverage goal: every main-DB provider + every
        # request_log provider gets exercised at least once.
        include:
          - database: sqlite
            request_log_database: sqlite
          - database: postgres
            request_log_database: postgres
          - database: sqlite
            request_log_database: clickhouse
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
        # Recent images enforce a password on the implicit `default` user
        # the moment you set CLICKHOUSE_USER, so provision an explicit
        # authproxy/authproxy/authproxy triple (matches the
        # integration-test job + dev_config/clickhouse/users.xml).
        env:
          CLICKHOUSE_DB: authproxy
          CLICKHOUSE_USER: authproxy
          CLICKHOUSE_PASSWORD: authproxy
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Test
      env:
        AUTH_PROXY_TEST_DATABASE_PROVIDER: ${{ matrix.database }}
        POSTGRES_TEST_HOST: localhost
        POSTGRES_TEST_PORT: "5432"
        POSTGRES_TEST_USER: postgres
        POSTGRES_TEST_PASSWORD: postgres
        POSTGRES_TEST_DATABASE: postgres
        POSTGRES_TEST_OPTIONS: sslmode=disable
        POSTGRES_TEST_MAX_PARALLEL: "2"
        POSTGRES_TEST_MAX_CONNS: "2"
        AUTH_PROXY_REQUEST_LOG_TEST_DATABASE_PROVIDER: ${{ matrix.request_log_database }}
        CLICKHOUSE_TEST_HOST: localhost
        CLICKHOUSE_TEST_PORT: "8123"
        CLICKHOUSE_TEST_USER: authproxy
        CLICKHOUSE_TEST_PASSWORD: authproxy
        CLICKHOUSE_TEST_DATABASE: authproxy
        CLICKHOUSE_TEST_MAX_PARALLEL: "2"
      run: go test -v ./...

  integration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: authproxy_integration
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:latest
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8124:8123
        env:
          CLICKHOUSE_DB: authproxy
          CLICKHOUSE_USER: authproxy
          CLICKHOUSE_PASSWORD: authproxy
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Set up Node + Yarn
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install marketplace deps + build
      run: |
        corepack enable
        yarn install --immutable
        yarn workspace @authproxy/marketplace build

    - name: Install Chrome for chromedp
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Start MinIO
      run: |
        docker run -d --name minio -p 9003:9000 \
          -e MINIO_ROOT_USER=minioadmin \
          -e MINIO_ROOT_PASSWORD=minioadmin \
          minio/minio:latest server /data
        for i in $(seq 1 30); do
          curl -sf http://localhost:9003/minio/health/live && break
          sleep 1
        done

    - name: Create MinIO buckets
      run: |
        docker run --rm --network host \
          -e MC_HOST_minio=http://minioadmin:minioadmin@localhost:9003 \
          --entrypoint /bin/sh \
          minio/mc -c "
            mc mb --ignore-existing minio/authproxy-request-logs &&
            mc mb --ignore-existing minio/authproxy-streaming-test &&
            mc anonymous set public minio/authproxy-streaming-test
          "

    - name: Start OAuth2 test provider
      working-directory: integration_tests
      run: |
        docker compose up -d --build oauth-server
        # Poll from the host — the upstream runtime image ships without
        # wget/curl/python so an in-container healthcheck would need extra
        # packages.
        for i in $(seq 1 60); do
          if curl -sf http://localhost:8086/test/health; then
            echo
            echo "OAuth2 test provider is ready"
            exit 0
          fi
          sleep 1
        done
        echo "OAuth2 test provider never became healthy — last container logs:"
        docker logs integration_tests-oauth-server-1 2>&1 | tail -50
        exit 1

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Integration Tests
      working-directory: integration_tests
      env:
        AUTH_PROXY_TEST_DATABASE_PROVIDER: postgres
        POSTGRES_TEST_HOST: localhost
        POSTGRES_TEST_PORT: "5433"
        POSTGRES_TEST_USER: postgres
        POSTGRES_TEST_PASSWORD: postgres
        POSTGRES_TEST_DATABASE: authproxy_integration
        POSTGRES_TEST_OPTIONS: sslmode=disable
        TF_ACC: "1"
      # Auto-retry failing tests up to twice (3 attempts total). The
      # chromedp browser tests in integration_tests/oauth2 are known
      # transient-flakey (websocket attach timeouts under CI load);
      # rerunning per-test on failure is cheaper than a forced manual
      # rerun of the whole 7-minute job. If more than 10 distinct
      # tests fail the first pass, skip retry — something is broken
      # at scale, not flakey. See issue #350.
      run: |
        gotestsum \
          --format=testname \
          --rerun-fails=2 \
          --rerun-fails-max-failures=10 \
          --packages=./... \
          -- -tags integration -timeout 10m
