# Docker Compose for integration tests.
# Uses non-default ports to avoid conflicts with local development services.
#
# Usage:
#   cd integration_tests && docker compose up -d
#   go test -tags integration -v ./...
#   docker compose down -v

services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authproxy_integration
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:latest
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8124:8123"
    environment:
      CLICKHOUSE_DB: authproxy
      CLICKHOUSE_USER: authproxy
      CLICKHOUSE_PASSWORD: authproxy
    tmpfs:
      - /var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    ports:
      - "9003:9000"
      - "9004:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    tmpfs:
      - /data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing minio/authproxy-request-logs
      "

  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-only-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      # Dev mode does not need mlock (and mlock via CAP_IPC_LOCK requires
      # CAP_SETFCAP to install at runtime). Skip setcap so the entrypoint
      # runs cleanly without extra privileges.
      SKIP_SETCAP: "true"
    command: server -dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 3s
      timeout: 3s
      retries: 10

  # OAuth test provider (rmorlok/go-oauth2-server, pinned to commit 3f566b94).
  #
  # TRANSITIONAL: The upstream is a real OAuth2 server, not a test harness. It
  # cannot drive the test scenarios in issue #159 until the test-mode control
  # plane lands upstream (see docs/oauth_test_provider_gaps.md, gaps G1-G12).
  # The plumbing here brings the server up so the harness work in #162 can
  # iterate; once upstream PR-1 (test-mode bootstrap) lands we'll drop the
  # etcd/postgres dependencies below and switch to --test-mode.
  oauth-etcd:
    image: gcr.io/etcd-development/etcd:v3.5.17
    command: >
      etcd
      --initial-cluster-state new
      --listen-client-urls http://0.0.0.0:2379
      --advertise-client-urls http://oauth-etcd:2379
    environment:
      ETCDCTL_API: "3"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 3s
      timeout: 3s
      retries: 10

  oauth-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: go_oauth2_server
      POSTGRES_DB: go_oauth2_server
      POSTGRES_HOST_AUTH_METHOD: trust
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go_oauth2_server"]
      interval: 3s
      timeout: 3s
      retries: 10

  oauth-etcd-config:
    build:
      context: ./oauth-etcd-config
    depends_on:
      oauth-etcd:
        condition: service_healthy
    environment:
      ETCDCTL_API: "3"
      ETCD_ENDPOINTS: "http://oauth-etcd:2379"

  oauth-server:
    build:
      context: https://github.com/rmorlok/go-oauth2-server.git#3f566b94e7cb651412a768ddceb9ccb85fa7191b
    depends_on:
      oauth-postgres:
        condition: service_healthy
      oauth-etcd-config:
        condition: service_completed_successfully
    ports:
      - "8086:8080"
    environment:
      ETCD_ENDPOINTS: "http://oauth-etcd:2379"
    command: ["runserver"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/v1/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30

  oauth-server-fixtures:
    build:
      context: https://github.com/rmorlok/go-oauth2-server.git#3f566b94e7cb651412a768ddceb9ccb85fa7191b
    depends_on:
      oauth-postgres:
        condition: service_healthy
      oauth-etcd-config:
        condition: service_completed_successfully
    environment:
      ETCD_ENDPOINTS: "http://oauth-etcd:2379"
    command: ["loaddata", "oauth/fixtures/test_clients.yml"]
